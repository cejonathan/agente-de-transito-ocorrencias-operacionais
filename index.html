<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agente Trânsito - Registro Operacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .active-tab { background-color: white; color: #d97706; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .inactive-tab { color: #64748b; }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(20px); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 pb-24">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-0 left-1/2 -translate-x-1/2 z-[100] w-full max-w-xs pointer-events-none"></div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] hidden items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center space-y-6 shadow-2xl">
            <div class="bg-red-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="trash-2" class="w-8 h-8 text-red-500"></i>
            </div>
            <div class="space-y-2">
                <h3 class="text-xl font-black text-slate-800">Excluir Registro?</h3>
                <p class="text-slate-500 text-sm">Esta ação não pode ser desfeita e o registro será removido do histórico.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 bg-slate-100 hover:bg-slate-200 transition-colors">Cancelar</button>
                <button id="confirm-delete-btn" class="flex-1 py-4 rounded-2xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-lg shadow-red-100 transition-colors">Excluir</button>
            </div>
        </div>
    </div>

    <!-- Local Modal -->
    <div id="local-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeLocalModal()"></div>
        <div class="relative w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-5 h-5 text-amber-500"></i> Novo Local
                    </h3>
                    <button onclick="closeLocalModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                    </button>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Nome do Local</label>
                    <input id="new-local-input" type="text" placeholder="Ex: Rua das Flores, 123" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-amber-500 focus:outline-none text-lg font-medium transition-all">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeLocalModal()" class="flex-1 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-colors">Cancelar</button>
                    <button onclick="confirmNewLocal()" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-bold shadow-lg shadow-amber-200 hover:bg-amber-600 active:scale-95 transition-all">Adicionar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Manage Options Modal -->
    <div id="manage-options-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeManageOptionsModal()"></div>
        <div class="relative w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between shrink-0">
                <h3 id="manage-options-title" class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="settings" class="w-5 h-5 text-amber-500"></i> Gerenciar Opções
                </h3>
                <button onclick="closeManageOptionsModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                </button>
            </div>
            <div class="p-6 space-y-4 overflow-y-auto custom-scrollbar flex-1">
                <div class="flex gap-2">
                    <input id="new-option-input" type="text" placeholder="Nova opção..." class="flex-1 p-3 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-amber-500 focus:outline-none font-medium transition-all">
                    <button onclick="addNewOption()" class="bg-amber-500 text-white p-3 rounded-xl active:scale-95 transition-all shadow-lg shadow-amber-100">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="options-list" class="space-y-2">
                    <!-- Options will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-amber-500 text-white p-6 shadow-md sticky top-0 z-20">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 id="agent-name-display" class="text-xl font-bold leading-tight">Agente Trânsito</h1>
                    <p class="text-amber-100 text-[10px] uppercase tracking-widest font-bold">Registro Operacional</p>
                </div>
            </div>
            <button onclick="openNameModal()" id="edit-name-btn" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full font-bold uppercase transition-colors flex items-center gap-1">
                <i data-lucide="edit-2" class="w-3 h-3"></i> Edit
            </button>
        </div>
    </header>

    <!-- Name Modal -->
    <div id="name-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeNameModal()"></div>
        <div class="relative w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="user" class="w-5 h-5 text-amber-500"></i> Nome do Agente
                    </h3>
                    <button onclick="closeNameModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                    </button>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Seu Nome</label>
                    <input id="agent-name-input" type="text" placeholder="Digite seu nome..." class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-amber-500 focus:outline-none text-lg font-medium transition-all">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeNameModal()" class="flex-1 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-colors">Cancelar</button>
                    <button onclick="saveAgentName()" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-bold shadow-lg shadow-amber-200 hover:bg-amber-600 active:scale-95 transition-all">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-3 sm:p-4 space-y-4 sm:space-y-6">
        <!-- Tabs -->
        <div class="flex bg-slate-200 p-1 rounded-xl shadow-inner overflow-x-auto no-scrollbar">
            <button onclick="switchTab('simples')" id="tab-simples" class="active-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap">
                <i data-lucide="file-text" class="w-4 h-4"></i> Simples
            </button>
            <button onclick="switchTab('especial')" id="tab-especial" class="inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap">
                <i data-lucide="alert-triangle" class="w-4 h-4"></i> Especial
            </button>
            <button onclick="switchTab('historico')" id="tab-historico" class="inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap">
                <i data-lucide="history" class="w-4 h-4"></i> Histórico
            </button>
        </div>

            <div id="content-simples" class="space-y-4 sm:space-y-6">
            <div class="bg-white rounded-2xl p-4 sm:p-6 shadow-xl border border-slate-100 space-y-4 sm:space-y-5">
                <div id="edit-indicator-simples" class="hidden p-3 bg-amber-50 border border-amber-100 rounded-xl flex items-center justify-between">
                    <span class="text-xs font-bold text-amber-700 uppercase tracking-tight flex items-center gap-2">
                        <i data-lucide="edit-2" class="w-3 h-3"></i> Editando Registro
                    </span>
                    <button onclick="handleClear()" class="text-[10px] font-black text-amber-500 uppercase">Cancelar</button>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-500 uppercase flex items-center justify-between gap-2">
                        <span class="flex items-center gap-2"><i data-lucide="hash" class="w-4 h-4"></i> Código</span>
                        <button onclick="openManageOptionsModal('codigo')" class="text-amber-500 hover:text-amber-600 transition-colors p-1">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                        </button>
                    </label>
                    <select id="simples-codigo" onchange="toggleCustomCodigo()" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-amber-500 focus:outline-none text-lg font-medium transition-colors appearance-none">
                        <option value="">Selecione um código...</option>
                    </select>
                    <input id="simples-custom-codigo" type="text" placeholder="Digite o código manualmente..." class="hidden w-full p-4 mt-2 bg-white border-2 border-amber-200 rounded-xl focus:border-amber-500 focus:outline-none text-lg font-medium transition-colors">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-500 uppercase flex items-center justify-between gap-2">
                        <span class="flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> Local</span>
                        <button onclick="openManageOptionsModal('local')" class="text-amber-500 hover:text-amber-600 transition-colors p-1">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                        </button>
                    </label>
                    <div class="flex gap-2">
                        <select id="simples-local" onchange="toggleCustomLocal()" class="flex-1 min-w-0 p-3 sm:p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-amber-500 focus:outline-none text-base sm:text-lg font-medium transition-colors appearance-none">
                            <option value="">Selecione um local...</option>
                        </select>
                        <button onclick="openLocalModal()" class="bg-amber-50 text-amber-600 p-3 sm:p-4 rounded-xl active:scale-95 transition-all border-2 border-amber-100 hover:bg-amber-100 shrink-0">
                            <i data-lucide="plus" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                        </button>
                    </div>
                    <input id="simples-custom-local" type="text" placeholder="Digite o local manualmente..." class="hidden w-full p-3 sm:p-4 mt-2 bg-white border-2 border-amber-200 rounded-xl focus:border-amber-500 focus:outline-none text-base sm:text-lg font-medium transition-colors">
                </div>

                <button onclick="handleAddSimplesItem()" class="w-full bg-amber-500 text-white py-3 sm:py-4 rounded-xl font-bold uppercase shadow-lg shadow-amber-100 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm sm:text-base">
                    <i data-lucide="plus" class="w-4 h-4 sm:w-5 sm:h-5"></i> Adicionar Ocorrência
                </button>

                <div id="simples-list-container" class="hidden space-y-2 pt-4 border-t border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Itens na Lista (<span id="simples-list-count">0</span>)</p>
                    <div id="simples-items-list" class="space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="handleSaveReport()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> Salvar Registro
                </button>
            </div>
        </div>

        <!-- Form Especial -->
        <div id="content-especial" class="hidden space-y-4 sm:space-y-6">
            <div class="bg-white rounded-2xl p-4 sm:p-6 shadow-xl border border-slate-100 space-y-4 sm:space-y-5">
                <div id="edit-indicator-especial" class="hidden p-3 bg-amber-50 border border-amber-100 rounded-xl flex items-center justify-between">
                    <span class="text-xs font-bold text-amber-700 uppercase tracking-tight flex items-center gap-2">
                        <i data-lucide="edit-2" class="w-3 h-3"></i> Editando Registro
                    </span>
                    <button onclick="handleClear()" class="text-[10px] font-black text-amber-500 uppercase">Cancelar</button>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-500 uppercase flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4"></i> Tipo de Ocorrência
                    </label>
                    <select id="especial-tipo" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-amber-500 focus:outline-none text-lg font-medium transition-colors appearance-none">
                        <option value="Sinistro de trânsito">1 - Sinistro de trânsito</option>
                        <option value="Buraco na via">2 - Buraco na via</option>
                        <option value="Relatório de Fiscalização">3 - Relatório de Fiscalização</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-500 uppercase flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Descrição
                    </label>
                    <textarea id="especial-descricao" placeholder="Descreva a situação..." rows="3" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-amber-500 focus:outline-none text-lg font-medium transition-colors"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-500 uppercase flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-4 h-4"></i> Local
                    </label>
                    <input id="especial-local" type="text" placeholder="Ex: Cruzamento X com Y" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-amber-500 focus:outline-none text-lg font-medium transition-colors">
                </div>
            </div>

            <div class="flex flex-wrap gap-3">
                <button onclick="handleSaveReport()" class="flex-1 min-w-[120px] bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> Salvar
                </button>
                <button onclick="handleSendWhatsApp()" class="flex-1 min-w-[120px] bg-green-500 text-white py-4 rounded-2xl font-bold uppercase shadow-xl shadow-green-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i> WhatsApp
                </button>
                <button onclick="handleClear()" class="w-full bg-slate-100 text-slate-500 py-3 rounded-xl font-bold uppercase text-xs active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="eraser" class="w-4 h-4"></i> Limpar Formulário
                </button>
            </div>
        </div>

        <!-- Histórico -->
        <div id="content-historico" class="hidden space-y-4">
            <div class="flex items-center justify-between px-2">
                <h2 class="font-black text-slate-400 uppercase text-xs tracking-widest">Registros Salvos (<span id="history-count">0</span>)</h2>
            </div>
            <div id="history-list" class="space-y-6"></div>
        </div>
    </main>

    <script>
        // --- CONSTANTS ---
        const CODIGOS_DEFAULT = [
            "1 Acompanhamento de alunos", "2 Apoio em obras", "3 Apoio em eventos", "4 Apoio ao agente de trânsito",
            "5 Acompanhamento de veículos (escolta)", "6 Fiscalização de caminhão", "7 COI", "8 Ação educativa",
            "9 Autorização de Caçamba/Caminhão", "10 Apoio órgão público/EDP/Telefonia", "11 Monitoramento",
            "12 Sinistro de trânsito sem vítima", "13 Sinistro de trânsito com vítima", "14 Animais na pista",
            "15 Trabalho administrativo", "16 Transporte interno", "17 Solicitação de munícipe", "18 Operação em semáforo",
            "19 Fiscalização em circulação", "20 Apoio a veículo quebrado", "21 Travessia de alunos", "22 Apoio a feira livre",
            "23 Desvio de trânsito", "24 Deslocamento ao centro do servidor", "25 Apoio a eventos religiosos",
            "26 Aferição de radar", "27 Autorizar veículos a passar no vermelho", "28 Manutenção da VTR", "29 Obra SAAE",
            "30 Remoção de veículo", "31 Remoção de veículo abandonado", "32 Apoio a pintura", "33 Apoio a poda de árvore",
            "34 Apoio a troca de poste/Recolha de fios caídos", "35 Deslocamento para diretoria de trânsito",
            "36 Deslocamento limpar VTR", "37 Blitz", "38 Fiscalização em extensão", "39 Controle de fluxo",
            "40 Fiscalização em ponto fixo", "41 Posturas", "42 Vistoria"
        ];
        const LOCAIS_DEFAULT = Array.from({ length: 15 }, (_, i) => `Setor ${i + 1}`);

        // --- STATE ---
        let activeTab = localStorage.getItem('traffic_active_tab') || 'simples';
        let reports = JSON.parse(localStorage.getItem('traffic_reports') || '[]');
        let availableCodigos = JSON.parse(localStorage.getItem('traffic_available_codigos') || JSON.stringify(CODIGOS_DEFAULT));
        let availableLocais = JSON.parse(localStorage.getItem('traffic_available_locais') || JSON.stringify(LOCAIS_DEFAULT));
        let agentName = localStorage.getItem('traffic_agent_name') || 'Agente Trânsito';
        let simplesList = JSON.parse(localStorage.getItem('traffic_simples_list_draft') || '[]');
        let editingId = localStorage.getItem('traffic_editing_id') || null;
        let manageType = 'codigo'; // 'codigo' or 'local'

        // --- INITIALIZATION ---
        function init() {
            try {
                renderSelects();
                renderHistory();
                updateAgentNameDisplay();
                loadDraft();
                switchTab(activeTab);
                
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                } else {
                    console.warn('Lucide not loaded yet, will retry in 500ms');
                    setTimeout(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 500);
                }

                // Add auto-save listeners
                const inputs = [
                    'simples-codigo', 'simples-custom-codigo', 'simples-local', 'simples-custom-local',
                    'especial-tipo', 'especial-descricao', 'especial-local'
                ];
                inputs.forEach(id => {
                    document.getElementById(id).addEventListener('input', saveDraft);
                });

            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        function saveDraft() {
            const draft = {
                simplesCodigo: document.getElementById('simples-codigo').value,
                simplesCustomCodigo: document.getElementById('simples-custom-codigo').value,
                simplesLocal: document.getElementById('simples-local').value,
                simplesCustomLocal: document.getElementById('simples-custom-local').value,
                especialTipo: document.getElementById('especial-tipo').value,
                especialDescricao: document.getElementById('especial-descricao').value,
                especialLocal: document.getElementById('especial-local').value,
                activeTab: activeTab,
                editingId: editingId
            };
            localStorage.setItem('traffic_form_draft', JSON.stringify(draft));
            localStorage.setItem('traffic_simples_list_draft', JSON.stringify(simplesList));
            localStorage.setItem('traffic_active_tab', activeTab);
            if (editingId) localStorage.setItem('traffic_editing_id', editingId);
            else localStorage.removeItem('traffic_editing_id');
        }

        function loadDraft() {
            const draft = JSON.parse(localStorage.getItem('traffic_form_draft') || '{}');
            if (draft.simplesCodigo) {
                document.getElementById('simples-codigo').value = draft.simplesCodigo;
                toggleCustomCodigo();
            }
            if (draft.simplesCustomCodigo) document.getElementById('simples-custom-codigo').value = draft.simplesCustomCodigo;
            if (draft.simplesLocal) {
                document.getElementById('simples-local').value = draft.simplesLocal;
                toggleCustomLocal();
            }
            if (draft.simplesCustomLocal) document.getElementById('simples-custom-local').value = draft.simplesCustomLocal;
            if (draft.especialTipo) document.getElementById('especial-tipo').value = draft.especialTipo;
            if (draft.especialDescricao) document.getElementById('especial-descricao').value = draft.especialDescricao;
            if (draft.especialLocal) document.getElementById('especial-local').value = draft.especialLocal;
            
            renderSimplesList();

            if (editingId) {
                if (activeTab === 'simples') document.getElementById('edit-indicator-simples').classList.remove('hidden');
                else document.getElementById('edit-indicator-especial').classList.remove('hidden');
            }
        }

        function updateAgentNameDisplay() {
            document.getElementById('agent-name-display').textContent = agentName;
            document.getElementById('agent-name-input').value = agentName;
        }

        function renderSelects() {
            const codigoSelect = document.getElementById('simples-codigo');
            codigoSelect.innerHTML = '<option value="">Selecione um código...</option>';
            availableCodigos.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt;
                el.textContent = opt;
                codigoSelect.appendChild(el);
            });
            codigoSelect.innerHTML += '<option value="Outros">Outros (Escrever manualmente)</option>';

            const localSelect = document.getElementById('simples-local');
            localSelect.innerHTML = '<option value="">Selecione um local...</option>';
            availableLocais.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt;
                el.textContent = opt;
                localSelect.appendChild(el);
            });
            localSelect.innerHTML += '<option value="Outros">Outros (Escrever manualmente)</option>';
        }

        // --- UI ACTIONS ---
        function switchTab(tab) {
            activeTab = tab;
            localStorage.setItem('traffic_active_tab', tab);
            document.getElementById('content-simples').classList.toggle('hidden', tab !== 'simples');
            document.getElementById('content-especial').classList.toggle('hidden', tab !== 'especial');
            document.getElementById('content-historico').classList.toggle('hidden', tab !== 'historico');

            document.getElementById('tab-simples').className = tab === 'simples' ? 'active-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap' : 'inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap';
            document.getElementById('tab-especial').className = tab === 'especial' ? 'active-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap' : 'inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap';
            document.getElementById('tab-historico').className = tab === 'historico' ? 'active-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap' : 'inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap';
            
            if (tab === 'historico') renderHistory();
            lucide.createIcons();
        }

        function toggleCustomCodigo() {
            const val = document.getElementById('simples-codigo').value;
            document.getElementById('simples-custom-codigo').classList.toggle('hidden', val !== 'Outros');
        }

        function toggleCustomLocal() {
            const val = document.getElementById('simples-local').value;
            document.getElementById('simples-custom-local').classList.toggle('hidden', val !== 'Outros');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-enter mt-4 mx-auto px-6 py-3 rounded-full shadow-lg text-white font-bold text-sm flex items-center gap-2 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.innerHTML = `<i data-lucide="${type === 'success' ? 'save' : 'alert-triangle'}" class="w-4 h-4"></i> ${message}`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), 3000);
        }

        // --- MODALS ---
        function openNameModal() { document.getElementById('name-modal').classList.replace('hidden', 'flex'); }
        function closeNameModal() { document.getElementById('name-modal').classList.replace('flex', 'hidden'); }
        function saveAgentName() {
            const newName = document.getElementById('agent-name-input').value.trim();
            if (!newName) return showToast('Digite um nome válido.', 'error');
            agentName = newName;
            localStorage.setItem('traffic_agent_name', agentName);
            updateAgentNameDisplay();
            closeNameModal();
            showToast('Nome atualizado!');
        }

        function openLocalModal() { document.getElementById('local-modal').classList.replace('hidden', 'flex'); }
        function closeLocalModal() { document.getElementById('local-modal').classList.replace('flex', 'hidden'); }
        function confirmNewLocal() {
            const name = document.getElementById('new-local-input').value.trim();
            if (!name) return showToast('Digite um nome.', 'error');
            if (availableLocais.includes(name)) return showToast('Já existe.', 'error');
            availableLocais.push(name);
            localStorage.setItem('traffic_available_locais', JSON.stringify(availableLocais));
            renderSelects();
            document.getElementById('simples-local').value = name;
            document.getElementById('new-local-input').value = '';
            closeLocalModal();
            showToast('Local adicionado!');
        }

        function openManageOptionsModal(type) {
            manageType = type;
            document.getElementById('manage-options-title').innerHTML = `
                <i data-lucide="settings" class="w-5 h-5 text-amber-500"></i> Gerenciar ${type === 'codigo' ? 'Códigos' : 'Locais'}
            `;
            document.getElementById('new-option-input').placeholder = `Novo ${type === 'codigo' ? 'código' : 'local'}...`;
            document.getElementById('manage-options-modal').classList.replace('hidden', 'flex');
            renderOptionsList();
            lucide.createIcons();
        }

        function closeManageOptionsModal() {
            document.getElementById('manage-options-modal').classList.replace('flex', 'hidden');
        }

        function renderOptionsList() {
            const list = document.getElementById('options-list');
            const options = manageType === 'codigo' ? availableCodigos : availableLocais;
            list.innerHTML = '';
            
            options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100 group';
                div.innerHTML = `
                    <span class="text-sm font-medium text-slate-700 truncate mr-2">${opt}</span>
                    <div class="flex gap-1 shrink-0">
                        <button onclick="editOption(${idx})" class="p-2 text-slate-400 hover:text-amber-500 transition-colors">
                            <i data-lucide="edit-2" class="w-4 h-4"></i>
                        </button>
                        <button onclick="deleteOption(${idx})" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function addNewOption() {
            const input = document.getElementById('new-option-input');
            const val = input.value.trim();
            if (!val) return showToast('Digite um valor.', 'error');
            
            const list = manageType === 'codigo' ? availableCodigos : availableLocais;
            if (list.includes(val)) return showToast('Já existe.', 'error');
            
            list.push(val);
            saveOptions();
            input.value = '';
            renderOptionsList();
            renderSelects();
            showToast('Adicionado!');
        }

        function deleteOption(idx) {
            const list = manageType === 'codigo' ? availableCodigos : availableLocais;
            list.splice(idx, 1);
            saveOptions();
            renderOptionsList();
            renderSelects();
            showToast('Excluído.');
        }

        function editOption(idx) {
            const list = manageType === 'codigo' ? availableCodigos : availableLocais;
            const newVal = prompt('Editar opção:', list[idx]);
            if (newVal === null) return;
            const trimmed = newVal.trim();
            if (!trimmed) return showToast('Valor inválido.', 'error');
            
            list[idx] = trimmed;
            saveOptions();
            renderOptionsList();
            renderSelects();
            showToast('Atualizado!');
        }

        function saveOptions() {
            if (manageType === 'codigo') {
                localStorage.setItem('traffic_available_codigos', JSON.stringify(availableCodigos));
            } else {
                localStorage.setItem('traffic_available_locais', JSON.stringify(availableLocais));
            }
        }

        let deleteTargetId = null;
        function openConfirm(id) {
            deleteTargetId = id;
            document.getElementById('confirm-modal').classList.replace('hidden', 'flex');
            document.getElementById('confirm-delete-btn').onclick = () => {
                const ids = deleteTargetId.split(',');
                reports = reports.filter(r => !ids.includes(r.id));
                localStorage.setItem('traffic_reports', JSON.stringify(reports));
                closeConfirm();
                renderHistory();
                showToast('Excluído com sucesso.');
            };
        }
        function closeConfirm() { document.getElementById('confirm-modal').classList.replace('flex', 'hidden'); }

        // --- FORM LOGIC ---
        function handleAddSimplesItem() {
            const codigoSelect = document.getElementById('simples-codigo').value;
            const customCodigo = document.getElementById('simples-custom-codigo').value;
            const localSelect = document.getElementById('simples-local').value;
            const customLocal = document.getElementById('simples-custom-local').value;

            const finalCodigo = codigoSelect === 'Outros' ? customCodigo : codigoSelect;
            const finalLocal = localSelect === 'Outros' ? customLocal : localSelect;

            if (!finalCodigo || !finalLocal) return showToast('Preencha Código e Local.', 'error');

            simplesList.push({ codigo: finalCodigo, local: finalLocal });
            saveDraft();
            renderSimplesList();
            document.getElementById('simples-local').value = '';
            document.getElementById('simples-custom-local').value = '';
            document.getElementById('simples-custom-local').classList.add('hidden');
        }

        function renderSimplesList() {
            const container = document.getElementById('simples-list-container');
            const list = document.getElementById('simples-items-list');
            const count = document.getElementById('simples-list-count');
            
            if (simplesList.length === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');
            count.textContent = simplesList.length;
            list.innerHTML = '';
            simplesList.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-slate-50 p-3 rounded-lg border border-slate-100';
                div.innerHTML = `
                    <div class="text-sm">
                        <span class="font-bold text-amber-600 mr-2">${item.codigo}</span>
                        <span class="text-slate-600">${item.local}</span>
                    </div>
                    <button onclick="removeSimplesItem(${idx})" class="text-slate-300 hover:text-red-500 transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function removeSimplesItem(idx) {
            simplesList.splice(idx, 1);
            saveDraft();
            renderSimplesList();
        }

        function handleClear() {
            simplesList = [];
            editingId = null;
            localStorage.removeItem('traffic_form_draft');
            localStorage.removeItem('traffic_simples_list_draft');
            localStorage.removeItem('traffic_editing_id');
            document.getElementById('simples-codigo').value = '';
            document.getElementById('simples-custom-codigo').value = '';
            document.getElementById('simples-custom-codigo').classList.add('hidden');
            document.getElementById('simples-local').value = '';
            document.getElementById('simples-custom-local').value = '';
            document.getElementById('simples-custom-local').classList.add('hidden');
            document.getElementById('especial-tipo').value = 'Sinistro';
            document.getElementById('especial-descricao').value = '';
            document.getElementById('especial-local').value = '';
            document.getElementById('edit-indicator-simples').classList.add('hidden');
            document.getElementById('edit-indicator-especial').classList.add('hidden');
            renderSimplesList();
        }

        function handleSaveReport() {
            let data = {};
            if (activeTab === 'simples') {
                const codigoSelect = document.getElementById('simples-codigo').value;
                const customCodigo = document.getElementById('simples-custom-codigo').value;
                const localSelect = document.getElementById('simples-local').value;
                const customLocal = document.getElementById('simples-custom-local').value;
                const finalCodigo = codigoSelect === 'Outros' ? customCodigo : codigoSelect;
                const finalLocal = localSelect === 'Outros' ? customLocal : localSelect;

                const finalItems = [...simplesList];
                if (finalCodigo && finalLocal) finalItems.push({ codigo: finalCodigo, local: finalLocal });
                if (finalItems.length === 0) return showToast('Adicione ocorrências.', 'error');
                
                data = { items: finalItems };
            } else {
                const tipo = document.getElementById('especial-tipo').value;
                const desc = document.getElementById('especial-descricao').value;
                const loc = document.getElementById('especial-local').value;
                if (!desc || !loc) return showToast('Preencha os campos.', 'error');
                data = { tipo, descricao: desc, local: loc };
            }

            const report = {
                id: editingId || Math.random().toString(36).substring(2),
                type: activeTab,
                data: data,
                agent: agentName,
                timestamp: Date.now()
            };

            if (editingId) {
                reports = reports.map(r => r.id === editingId ? report : r);
            } else {
                reports.unshift(report);
            }

            localStorage.setItem('traffic_reports', JSON.stringify(reports));
            localStorage.removeItem('traffic_form_draft');
            localStorage.removeItem('traffic_simples_list_draft');
            localStorage.removeItem('traffic_editing_id');
            showToast(editingId ? 'Atualizado!' : 'Salvo localmente!');
            handleClear();
        }

        // --- HISTORY ---
        function renderHistory() {
            const list = document.getElementById('history-list');
            const count = document.getElementById('history-count');
            count.textContent = reports.length;

            if (reports.length === 0) {
                list.innerHTML = `
                    <div class="bg-white rounded-2xl p-10 text-center border-2 border-dashed border-slate-200">
                        <i data-lucide="history" class="w-12 h-12 text-slate-200 mx-auto mb-4"></i>
                        <p class="text-slate-400 font-medium">Nenhum registro encontrado.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const groups = {};
            reports.forEach(r => {
                const date = new Date(r.timestamp).toLocaleDateString('pt-BR');
                if (!groups[date]) groups[date] = { simples: [], especial: [] };
                if (r.type === 'simples') groups[date].simples.push(r);
                else groups[date].especial.push(r);
            });

            list.innerHTML = '';
            Object.entries(groups).sort((a,b) => {
                const [da, ma, ya] = a[0].split('/');
                const [db, mb, yb] = b[0].split('/');
                return new Date(`${yb}-${mb}-${db}`) - new Date(`${ya}-${ma}-${da}`);
            }).forEach(([date, grp]) => {
                const dateDiv = document.createElement('div');
                dateDiv.className = 'space-y-3';
                dateDiv.innerHTML = `
                    <div class="flex items-center gap-2 px-2">
                        <div class="h-[1px] flex-1 bg-slate-200"></div>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${date}</span>
                        <div class="h-[1px] flex-1 bg-slate-200"></div>
                    </div>
                `;

                if (grp.simples.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4';
                    const allItems = grp.simples.flatMap(r => r.data.items || []);
                    const ids = grp.simples.map(r => r.id).join(',');
                    
                    let itemsHtml = '';
                    grp.simples.sort((a,b) => b.timestamp - a.timestamp).forEach(r => {
                        itemsHtml += `
                            <div class="space-y-2">
                                <div class="flex justify-end items-center">
                                    <div class="flex gap-2">
                                        <button onclick="editReport('${r.id}')" class="text-[9px] text-amber-500 font-bold uppercase">Editar</button>
                                        <button onclick="openConfirm('${r.id}')" class="text-[9px] text-red-400 font-bold uppercase">Remover</button>
                                    </div>
                                </div>
                                <div class="text-[10px] text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-1">
                                    ${r.data.items.map(it => `<div class="flex justify-between"><span class="font-bold text-slate-600">${it.codigo}</span><span class="truncate ml-2 text-slate-400">${it.local}</span></div>`).join('')}
                                </div>
                            </div>
                        `;
                    });

                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded-full bg-blue-100 text-blue-600">Ocorrências Simples</span>
                            <button onclick="openConfirm('${ids}')" class="p-1 text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <div class="space-y-4">${itemsHtml}</div>
                        <button onclick="sendWhatsAppBulk('${date}')" class="w-full bg-green-50 text-green-600 py-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2 hover:bg-green-100 transition-all border border-green-100">
                            <i data-lucide="send" class="w-3 h-3"></i> Enviar Tudo (${date})
                        </button>
                    `;
                    dateDiv.appendChild(card);
                }

                grp.especial.sort((a,b) => b.timestamp - a.timestamp).forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-3';
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded-full bg-amber-100 text-amber-600">${r.data.tipo}</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editReport('${r.id}')" class="p-2 text-slate-400 hover:text-amber-500 transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                <button onclick="openConfirm('${r.id}')" class="p-2 text-slate-400 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <p class="font-bold text-slate-700">${r.data.descricao}</p>
                            <p class="text-sm text-slate-500 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${r.data.local}</p>
                        </div>
                        <button onclick="sendWhatsAppSingle('${r.id}')" class="w-full bg-green-50 text-green-600 py-2 rounded-xl font-bold text-xs flex items-center justify-center gap-2 hover:bg-green-100 transition-colors border border-green-100">
                            <i data-lucide="send" class="w-3 h-3"></i> Reenviar WhatsApp
                        </button>
                    `;
                    dateDiv.appendChild(card);
                });

                list.appendChild(dateDiv);
            });
            lucide.createIcons();
        }

        function editReport(id) {
            const r = reports.find(x => x.id === id);
            if (!r) return;
            editingId = id;
            activeTab = r.type;
            saveDraft();
            switchTab(r.type);
            if (r.type === 'simples') {
                simplesList = [...r.data.items];
                renderSimplesList();
                document.getElementById('edit-indicator-simples').classList.remove('hidden');
            } else {
                document.getElementById('especial-tipo').value = r.data.tipo;
                document.getElementById('especial-descricao').value = r.data.descricao;
                document.getElementById('especial-local').value = r.data.local;
                document.getElementById('edit-indicator-especial').classList.remove('hidden');
            }
        }

        // --- WHATSAPP ---
        function handleSendWhatsApp() {
            let message = '';
            if (activeTab === 'simples') {
                const codigoSelect = document.getElementById('simples-codigo').value;
                const customCodigo = document.getElementById('simples-custom-codigo').value;
                const localSelect = document.getElementById('simples-local').value;
                const customLocal = document.getElementById('simples-custom-local').value;
                const finalCodigo = codigoSelect === 'Outros' ? customCodigo : codigoSelect;
                const finalLocal = localSelect === 'Outros' ? customLocal : localSelect;

                const finalItems = [...simplesList];
                if (finalCodigo && finalLocal) finalItems.push({ codigo: finalCodigo, local: finalLocal });
                if (finalItems.length === 0) return showToast('Adicione ocorrências.', 'error');
                
                message = formatSimplesMessage(finalItems);
            } else {
                const tipo = document.getElementById('especial-tipo').value;
                const desc = document.getElementById('especial-descricao').value;
                const loc = document.getElementById('especial-local').value;
                if (!desc || !loc) return showToast('Preencha os campos.', 'error');
                message = `*REGISTRO DE OCORRÊNCIAS*\n*Agente:* ${agentName}\n\n*OCORRÊNCIA ESPECIAL*\n\n*Tipo:* ${tipo}\n*Descrição:* ${desc}\n*Local:* ${loc}`;
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function sendWhatsAppSingle(id) {
            const r = reports.find(x => x.id === id);
            if (!r) return;
            let message = '';
            const reportAgent = r.agent || agentName;
            if (r.type === 'simples') message = formatSimplesMessage(r.data.items, reportAgent);
            else message = `*REGISTRO DE OCORRÊNCIAS*\n*Agente:* ${reportAgent}\n\n*OCORRÊNCIA ESPECIAL*\n\n*Tipo:* ${r.data.tipo}\n*Descrição:* ${r.data.descricao}\n*Local:* ${r.data.local}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function sendWhatsAppBulk(date) {
            const dayReports = reports.filter(r => new Date(r.timestamp).toLocaleDateString('pt-BR') === date && r.type === 'simples');
            const allItems = dayReports.flatMap(r => r.data.items);
            const message = formatSimplesMessage(allItems, agentName);
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function formatSimplesMessage(items, name) {
            const currentAgent = name || agentName;
            const grouped = {};
            items.forEach(it => {
                if (!grouped[it.codigo]) grouped[it.codigo] = [];
                grouped[it.codigo].push(it.local);
            });
            let msg = `*REGISTRO DE OCORRÊNCIAS*\n*Agente:* ${currentAgent}\n\n*OCORRÊNCIAS SIMPLES*\n`;
            Object.keys(grouped).forEach(cod => {
                msg += `\n*Código:* ${cod}\n*Locais:*`;
                grouped[cod].forEach(loc => msg += `\n- ${loc}`);
                msg += `\n`;
            });
            return msg;
        }

        init();
    </script>
</body>
