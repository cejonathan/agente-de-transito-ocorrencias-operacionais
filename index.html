<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agente Trânsito - Registro Operacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .active-tab { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .inactive-tab { color: #64748b; }
        .bg-dark-gradient { background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(20px); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen bg-dark-gradient text-slate-100 pb-24">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-0 left-1/2 -translate-x-1/2 z-[100] w-full max-w-xs pointer-events-none"></div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[110] hidden items-center justify-center p-6">
        <div class="glass-card rounded-3xl p-8 max-w-xs w-full text-center space-y-6 shadow-2xl">
            <div class="bg-indigo-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="trash-2" class="w-8 h-8 text-indigo-400"></i>
            </div>
            <div class="space-y-2">
                <h3 class="text-xl font-black text-slate-100">Excluir Registro?</h3>
                <p class="text-slate-400 text-sm">Esta ação não pode ser desfeita e o registro será removido do histórico.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 bg-slate-800 hover:bg-slate-700 transition-colors">Cancelar</button>
                <button id="confirm-delete-btn" class="flex-1 py-4 rounded-2xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-lg shadow-red-900/20 transition-colors">Excluir</button>
            </div>
        </div>
    </div>

    <!-- Local Modal -->
    <div id="local-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeLocalModal()"></div>
        <div class="relative w-full max-w-md glass-card rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold text-slate-100 flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-5 h-5 text-indigo-400"></i> Novo Local
                    </h3>
                    <button onclick="closeLocalModal()" class="p-2 hover:bg-slate-800 rounded-full transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-slate-500"></i>
                    </button>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Nome do Local</label>
                    <input id="new-local-input" type="text" placeholder="Ex: Rua das Flores, 123" class="w-full p-4 bg-slate-800 border-2 border-slate-700 rounded-2xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-all text-slate-100 placeholder:text-slate-600">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeLocalModal()" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 bg-slate-800 hover:bg-slate-700 transition-colors">Cancelar</button>
                    <button onclick="confirmNewLocal()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-900/40 hover:bg-indigo-500 active:scale-95 transition-all">Adicionar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Manage Options Modal -->
    <div id="manage-options-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeManageOptionsModal()"></div>
        <div class="relative w-full max-w-md glass-card rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-6 border-b border-slate-800 flex items-center justify-between shrink-0">
                <h3 id="manage-options-title" class="text-xl font-bold text-slate-100 flex items-center gap-2">
                    <i data-lucide="settings" class="w-5 h-5 text-indigo-400"></i> Gerenciar Opções
                </h3>
                <button onclick="closeManageOptionsModal()" class="p-2 hover:bg-slate-800 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-slate-500"></i>
                </button>
            </div>
            <div class="p-6 space-y-4 overflow-y-auto custom-scrollbar flex-1">
                <div class="flex gap-2">
                    <input id="new-option-input" type="text" placeholder="Nova opção..." class="flex-1 p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 focus:outline-none font-medium transition-all text-slate-100 placeholder:text-slate-600">
                    <button onclick="addNewOption()" class="bg-indigo-600 text-white p-3 rounded-xl active:scale-95 transition-all shadow-lg shadow-indigo-900/40">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="options-list" class="space-y-2">
                    <!-- Options will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-slate-900/50 backdrop-blur-md text-white p-6 shadow-2xl sticky top-0 z-20 border-b border-white/5">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600/20 p-2 rounded-lg">
                    <i data-lucide="user" class="w-6 h-6 text-indigo-400"></i>
                </div>
                <div>
                    <h1 id="agent-name-display" class="text-xl font-bold leading-tight text-slate-100">Agente Trânsito</h1>
                    <div class="flex items-center gap-2">
                        <p class="text-indigo-400 text-[10px] uppercase tracking-widest font-bold">Registro Operacional</p>
                        <span id="today-counter" class="bg-indigo-500/20 text-indigo-400 text-[9px] px-1.5 py-0.5 rounded-full font-black border border-indigo-500/30">0 HOJE</span>
                    </div>
                </div>
            </div>
            <button onclick="openNameModal()" id="edit-name-btn" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-full font-bold uppercase transition-colors flex items-center gap-1 text-slate-300">
                <i data-lucide="edit-2" class="w-3 h-3"></i> Edit
            </button>
        </div>
    </header>

    <!-- Name Modal -->
    <div id="name-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeNameModal()"></div>
        <div class="relative w-full max-w-md glass-card rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold text-slate-100 flex items-center gap-2">
                        <i data-lucide="user" class="w-5 h-5 text-indigo-400"></i> Nome do Agente
                    </h3>
                    <button onclick="closeNameModal()" class="p-2 hover:bg-slate-800 rounded-full transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-slate-500"></i>
                    </button>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Seu Nome</label>
                    <input id="agent-name-input" type="text" placeholder="Digite seu nome..." class="w-full p-4 bg-slate-800 border-2 border-slate-700 rounded-2xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-all text-slate-100 placeholder:text-slate-600">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeNameModal()" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 bg-slate-800 hover:bg-slate-700 transition-colors">Cancelar</button>
                    <button onclick="saveAgentName()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-900/40 hover:bg-indigo-500 active:scale-95 transition-all">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-3 sm:p-4 space-y-4 sm:space-y-6">
        <!-- Tabs -->
        <div class="flex glass-card p-1.5 rounded-2xl shadow-2xl overflow-x-auto no-scrollbar">
            <button onclick="switchTab('simples')" id="tab-simples" class="active-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap">
                <i data-lucide="file-text" class="w-4 h-4"></i> Simples
            </button>
            <button onclick="switchTab('especial')" id="tab-especial" class="inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap">
                <i data-lucide="alert-triangle" class="w-4 h-4"></i> Especial
            </button>
            <button onclick="switchTab('historico')" id="tab-historico" class="inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap">
                <i data-lucide="history" class="w-4 h-4"></i> Histórico
            </button>
        </div>

            <div id="content-simples" class="space-y-4 sm:space-y-6">
            <div class="glass-card rounded-3xl p-4 sm:p-6 shadow-2xl space-y-4 sm:space-y-5">
                <div id="edit-indicator-simples" class="hidden p-3 bg-indigo-500/10 border border-indigo-500/20 rounded-xl flex items-center justify-between">
                    <span class="text-xs font-bold text-indigo-400 uppercase tracking-tight flex items-center gap-2">
                        <i data-lucide="edit-2" class="w-3 h-3"></i> Editando Registro
                    </span>
                    <button onclick="handleClear()" class="text-[10px] font-black text-indigo-400 uppercase">Cancelar</button>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-400 uppercase flex items-center justify-between gap-2">
                        <span class="flex items-center gap-2"><i data-lucide="hash" class="w-4 h-4"></i> Código</span>
                        <button onclick="openManageOptionsModal('codigo')" class="text-indigo-400 hover:text-indigo-300 transition-colors p-1">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                        </button>
                    </label>
                    <select id="simples-codigo" onchange="toggleCustomCodigo()" class="w-full p-4 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors appearance-none text-slate-100">
                        <option value="">Selecione um código...</option>
                    </select>
                    <input id="simples-custom-codigo" type="text" placeholder="Digite o código manualmente..." class="hidden w-full p-4 mt-2 bg-slate-800 border-2 border-indigo-500/50 rounded-xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors text-slate-100">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-400 uppercase flex items-center justify-between gap-2">
                        <span class="flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> Local</span>
                        <button onclick="openManageOptionsModal('local')" class="text-indigo-400 hover:text-indigo-300 transition-colors p-1">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                        </button>
                    </label>
                    <div class="flex gap-2">
                        <select id="simples-local" onchange="toggleCustomLocal()" class="flex-1 min-w-0 p-3 sm:p-4 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 focus:outline-none text-base sm:text-lg font-medium transition-colors appearance-none text-slate-100">
                            <option value="">Selecione um local...</option>
                        </select>
                        <button onclick="openLocalModal()" class="bg-indigo-600/10 text-indigo-400 p-3 sm:p-4 rounded-xl active:scale-95 transition-all border-2 border-indigo-500/20 hover:bg-indigo-600/20 shrink-0">
                            <i data-lucide="plus" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                        </button>
                    </div>
                    <input id="simples-custom-local" type="text" placeholder="Digite o local manualmente..." class="hidden w-full p-3 sm:p-4 mt-2 bg-slate-800 border-2 border-indigo-500/50 rounded-xl focus:border-indigo-500 focus:outline-none text-base sm:text-lg font-medium transition-colors text-slate-100">
                </div>

                <button onclick="handleAddSimplesItem()" class="w-full bg-indigo-600 text-white py-3 sm:py-4 rounded-xl font-bold uppercase shadow-lg shadow-indigo-900/40 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm sm:text-base">
                    <i data-lucide="plus" class="w-4 h-4 sm:w-5 sm:h-5"></i> Adicionar Ocorrência
                </button>

                <div id="simples-list-container" class="hidden space-y-2 pt-4 border-t border-slate-800">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Itens na Lista (<span id="simples-list-count">0</span>)</p>
                    <div id="simples-items-list" class="space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="handleSaveReport()" class="w-full bg-gradient-to-r from-slate-100 to-slate-300 text-slate-950 py-4 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> Salvar Registro
                </button>
            </div>
        </div>

        <!-- Form Especial -->
        <div id="content-especial" class="hidden space-y-4 sm:space-y-6">
            <div class="glass-card rounded-3xl p-4 sm:p-6 shadow-2xl space-y-4 sm:space-y-5">
                <div id="edit-indicator-especial" class="hidden p-3 bg-indigo-500/10 border border-indigo-500/20 rounded-xl flex items-center justify-between">
                    <span class="text-xs font-bold text-indigo-400 uppercase tracking-tight flex items-center gap-2">
                        <i data-lucide="edit-2" class="w-3 h-3"></i> Editando Registro
                    </span>
                    <button onclick="handleClear()" class="text-[10px] font-black text-indigo-400 uppercase">Cancelar</button>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-400 uppercase flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4"></i> Tipo de Ocorrência
                    </label>
                    <select id="especial-tipo" class="w-full p-4 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors appearance-none text-slate-100">
                        <option value="Sinistro de trânsito">Sinistro de trânsito</option>
                        <option value="Remoção de veículo">Remoção de veículo</option>
                        <option value="Remoção de veículo em estado de abandono">Remoção de veículo em estado de abandono</option>
                        <option value="Relatório de fiscalização">Relatório de fiscalização</option>
                        <option value="Buraco na via">Buraco na via</option>
                    </select>
                </div>

                <div id="generic-especial-fields" class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-400 uppercase flex items-center gap-2">
                            <i data-lucide="file-text" class="w-4 h-4"></i> Descrição
                        </label>
                        <textarea id="especial-descricao" placeholder="Descreva a situação..." rows="3" class="w-full p-4 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors text-slate-100"></textarea>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-400 uppercase flex items-center gap-2">
                            <i data-lucide="map-pin" class="w-4 h-4"></i> Local
                        </label>
                        <input id="especial-local" type="text" placeholder="Ex: Cruzamento X com Y" class="w-full p-4 bg-slate-800 border-2 border-slate-700 rounded-2xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors text-slate-100">
                    </div>
                </div>

                <!-- Sinistro de Trânsito Fields -->
                <div id="sinistro-fields" class="hidden space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Data</label>
                            <input type="date" id="sinistro-data" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Hora</label>
                            <input type="time" id="sinistro-hora" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">N° Ocorrência</label>
                            <input type="text" id="sinistro-numero" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Origem</label>
                            <select id="sinistro-origem" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                                <option value="Fiscalização de rotina">Fiscalização de rotina</option>
                                <option value="COTRAN">COTRAN</option>
                                <option value="COI">COI</option>
                                <option value="CECOM">CECOM</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase">Endereço</label>
                        <input type="text" id="sinistro-endereco" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Característica</label>
                            <select id="sinistro-caracteristica" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                                <option value="Com vítima">Com vítima</option>
                                <option value="Sem vítima">Sem vítima</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Sexo</label>
                            <select id="sinistro-sexo" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-bold text-slate-400 uppercase">Envolvidos</label>
                        <div id="envolvidos-container" class="space-y-3"></div>
                        <button onclick="addEnvolvido()" class="w-full py-2 bg-slate-800 border border-dashed border-slate-600 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-700 transition-colors">
                            + Adicionar Envolvido
                        </button>
                    </div>

                    <div class="space-y-4 p-4 bg-slate-900/50 rounded-2xl border border-slate-800">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Socorro Médico</label>
                            <select id="sinistro-socorro" onchange="toggleSocorroFields()" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                                <option value="Sem Necessidade">Sem Necessidade</option>
                                <option value="SAMU">SAMU</option>
                                <option value="RESGATE">RESGATE</option>
                                <option value="Vítima Recusou">Vítima Recusou</option>
                            </select>
                        </div>
                        <div id="socorro-vtr-fields" class="hidden grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-400 uppercase">Prefixo VTR</label>
                                <input type="text" id="sinistro-socorro-prefixo" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-400 uppercase">Responsável</label>
                                <input type="text" id="sinistro-socorro-responsavel" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-bold text-slate-400 uppercase">Apoio Policial</label>
                        <div id="apoio-container" class="space-y-3"></div>
                        <button onclick="addApoio()" class="w-full py-2 bg-slate-800 border border-dashed border-slate-600 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-700 transition-colors">
                            + Adicionar Apoio Policial
                        </button>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase">Resumo dos Fatos</label>
                        <textarea id="sinistro-resumo" rows="3" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100" placeholder="Descreva os detalhes do sinistro..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Agentes Envolvidos</label>
                            <div class="flex flex-col gap-2">
                                <select id="sinistro-agentes-select" onchange="toggleCustomAgente()" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                                    <option value="DET 08">DET 08</option>
                                    <option value="DET 10">DET 10</option>
                                    <option value="DET 12">DET 12</option>
                                    <option value="DET 61">DET 61</option>
                                    <option value="DET 86">DET 86</option>
                                    <option value="Outros">Outros (Escrever manualmente)</option>
                                </select>
                                <input type="text" id="sinistro-agentes-custom" class="hidden w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100" placeholder="Nome do Agente">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">VTR</label>
                            <select id="sinistro-vtr" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                                <option value="1390">1390</option>
                                <option value="1393">1393</option>
                                <option value="1395">1395</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Supervisão</label>
                            <input type="text" id="sinistro-supervisao" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Responsável</label>
                            <input type="text" id="sinistro-responsavel" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Matrícula</label>
                            <input type="text" id="sinistro-matricula" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Data do Relatório</label>
                            <input type="date" id="sinistro-data-final" class="w-full p-3 bg-slate-800 border-2 border-slate-700 rounded-xl focus:border-indigo-500 text-slate-100">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap gap-3">
                <button onclick="handleSaveReport()" class="flex-1 min-w-[120px] bg-gradient-to-r from-slate-100 to-slate-300 text-slate-950 py-4 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> Salvar
                </button>
                <button onclick="handleSendWhatsApp()" class="flex-1 min-w-[120px] bg-gradient-to-r from-green-600 to-emerald-700 text-white py-4 rounded-2xl font-black uppercase shadow-xl shadow-green-900/40 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i> WhatsApp
                </button>
                <button onclick="handleClear()" class="w-full bg-slate-800 text-slate-400 py-3 rounded-xl font-bold uppercase text-xs active:scale-95 transition-all flex items-center justify-center gap-2 border border-slate-700">
                    <i data-lucide="eraser" class="w-4 h-4"></i> Limpar Formulário
                </button>
            </div>
        </div>

        <!-- Histórico -->
        <div id="content-historico" class="hidden space-y-4">
            <div class="flex items-center justify-between px-2">
                <h2 class="font-black text-slate-500 uppercase text-xs tracking-widest">Registros Salvos (<span id="history-count">0</span>)</h2>
            </div>
            <div id="history-list" class="space-y-6"></div>
        </div>
    </main>

    <script>
        // --- CONSTANTS ---
        const CODIGOS_DEFAULT = [
            "1 Acompanhamento de alunos", "2 Apoio em obras", "3 Apoio em eventos", "4 Apoio ao agente de trânsito",
            "5 Acompanhamento de veículos (escolta)", "6 Fiscalização de caminhão", "7 COI", "8 Ação educativa",
            "9 Autorização de Caçamba/Caminhão", "10 Apoio órgão público/EDP/Telefonia", "11 Monitoramento",
            "12 Sinistro de trânsito sem vítima", "13 Sinistro de trânsito com vítima", "14 Animais na pista",
            "15 Trabalho administrativo", "16 Transporte interno", "17 Solicitação de munícipe", "18 Operação em semáforo",
            "19 Fiscalização em circulação", "20 Apoio a veículo quebrado", "21 Travessia de alunos", "22 Apoio a feira livre",
            "23 Desvio de trânsito", "24 Deslocamento ao centro do servidor", "25 Apoio a eventos religiosos",
            "26 Aferição de radar", "27 Autorizar veículos a passar no vermelho", "28 Manutenção da VTR", "29 Obra SAAE",
            "30 Remoção de veículo", "31 Remoção de veículo abandonado", "32 Apoio a pintura", "33 Apoio a poda de árvore",
            "34 Apoio a troca de poste/Recolha de fios caídos", "35 Deslocamento para diretoria de trânsito",
            "36 Deslocamento limpar VTR", "37 Blitz", "38 Fiscalização em extensão", "39 Controle de fluxo",
            "40 Fiscalização em ponto fixo", "41 Posturas", "42 Vistoria"
        ];
        const LOCAIS_DEFAULT = Array.from({ length: 15 }, (_, i) => `Setor ${i + 1}`);

        // --- STATE ---
        let activeTab = localStorage.getItem('traffic_active_tab') || 'simples';
        let reports = JSON.parse(localStorage.getItem('traffic_reports') || '[]');
        let availableCodigos = JSON.parse(localStorage.getItem('traffic_available_codigos') || JSON.stringify(CODIGOS_DEFAULT));
        let availableLocais = JSON.parse(localStorage.getItem('traffic_available_locais') || JSON.stringify(LOCAIS_DEFAULT));
        let agentName = localStorage.getItem('traffic_agent_name') || 'Agente Trânsito';
        let simplesList = JSON.parse(localStorage.getItem('traffic_simples_list_draft') || '[]');
        let editingId = localStorage.getItem('traffic_editing_id') || null;
        let manageType = 'codigo'; // 'codigo' or 'local'
        let envolvidosCount = 0;
        let apoioCount = 0;

        // --- INITIALIZATION ---
        function init() {
            try {
                renderSelects();
                renderHistory();
                updateAgentNameDisplay();
                loadDraft();
                switchTab(activeTab);
                
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                } else {
                    console.warn('Lucide not loaded yet, will retry in 500ms');
                    setTimeout(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 500);
                }

                // Add auto-save listeners
                const inputs = [
                    'simples-codigo', 'simples-custom-codigo', 'simples-local', 'simples-custom-local',
                    'especial-tipo', 'especial-descricao', 'especial-local',
                    'sinistro-data', 'sinistro-hora', 'sinistro-numero', 'sinistro-origem',
                    'sinistro-endereco', 'sinistro-caracteristica', 'sinistro-sexo',
                    'sinistro-socorro', 'sinistro-socorro-prefixo', 'sinistro-socorro-responsavel',
                    'sinistro-resumo', 'sinistro-agentes-select', 'sinistro-agentes-custom',
                    'sinistro-vtr', 'sinistro-supervisao', 'sinistro-responsavel',
                    'sinistro-matricula', 'sinistro-data-final'
                ];
                inputs.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.addEventListener('input', saveDraft);
                });

                document.getElementById('especial-tipo').addEventListener('change', toggleEspecialFields);
                toggleEspecialFields();

            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        function saveDraft() {
            const draft = {
                simplesCodigo: document.getElementById('simples-codigo').value,
                simplesCustomCodigo: document.getElementById('simples-custom-codigo').value,
                simplesLocal: document.getElementById('simples-local').value,
                simplesCustomLocal: document.getElementById('simples-custom-local').value,
                especialTipo: document.getElementById('especial-tipo').value,
                especialDescricao: document.getElementById('especial-descricao').value,
                especialLocal: document.getElementById('especial-local').value,
                sinistro: {
                    data: document.getElementById('sinistro-data').value,
                    hora: document.getElementById('sinistro-hora').value,
                    numero: document.getElementById('sinistro-numero').value,
                    origem: document.getElementById('sinistro-origem').value,
                    endereco: document.getElementById('sinistro-endereco').value,
                    caracteristica: document.getElementById('sinistro-caracteristica').value,
                    sexo: document.getElementById('sinistro-sexo').value,
                    socorro: document.getElementById('sinistro-socorro').value,
                    socorroPrefixo: document.getElementById('sinistro-socorro-prefixo').value,
                    socorroResponsavel: document.getElementById('sinistro-socorro-responsavel').value,
                    resumo: document.getElementById('sinistro-resumo').value,
                    agentesSelect: document.getElementById('sinistro-agentes-select').value,
                    agentesCustom: document.getElementById('sinistro-agentes-custom').value,
                    vtr: document.getElementById('sinistro-vtr').value,
                    supervisao: document.getElementById('sinistro-supervisao').value,
                    responsavel: document.getElementById('sinistro-responsavel').value,
                    matricula: document.getElementById('sinistro-matricula').value,
                    dataFinal: document.getElementById('sinistro-data-final').value,
                    envolvidos: Array.from(document.getElementById('envolvidos-container').children).map(div => {
                        const id = div.id.split('-')[1];
                        return {
                            tipo: document.getElementById(`envolvido-tipo-${id}`).value,
                            custom: document.getElementById(`envolvido-custom-${id}`).value,
                            placa: document.getElementById(`envolvido-placa-${id}`).value,
                            cnh: document.getElementById(`envolvido-cnh-${id}`).value
                        };
                    }),
                    apoio: Array.from(document.getElementById('apoio-container').children).map(div => {
                        const id = div.id.split('-')[1];
                        return {
                            tipo: document.getElementById(`apoio-tipo-${id}`).value,
                            prefixo: document.getElementById(`apoio-prefixo-${id}`).value,
                            responsavel: document.getElementById(`apoio-responsavel-${id}`).value
                        };
                    })
                },
                activeTab: activeTab,
                editingId: editingId
            };
            localStorage.setItem('traffic_form_draft', JSON.stringify(draft));
            localStorage.setItem('traffic_simples_list_draft', JSON.stringify(simplesList));
            localStorage.setItem('traffic_active_tab', activeTab);
            if (editingId) localStorage.setItem('traffic_editing_id', editingId);
            else localStorage.removeItem('traffic_editing_id');
        }

        function loadDraft() {
            const draft = JSON.parse(localStorage.getItem('traffic_form_draft') || '{}');
            if (draft.simplesCodigo) {
                document.getElementById('simples-codigo').value = draft.simplesCodigo;
                toggleCustomCodigo();
            }
            if (draft.simplesCustomCodigo) document.getElementById('simples-custom-codigo').value = draft.simplesCustomCodigo;
            if (draft.simplesLocal) {
                document.getElementById('simples-local').value = draft.simplesLocal;
                toggleCustomLocal();
            }
            if (draft.simplesCustomLocal) document.getElementById('simples-custom-local').value = draft.simplesCustomLocal;
            if (draft.especialTipo) {
                document.getElementById('especial-tipo').value = draft.especialTipo;
                toggleEspecialFields();
            }
            if (draft.especialDescricao) document.getElementById('especial-descricao').value = draft.especialDescricao;
            if (draft.especialLocal) document.getElementById('especial-local').value = draft.especialLocal;
            
            if (draft.sinistro) {
                document.getElementById('sinistro-data').value = draft.sinistro.data || '';
                document.getElementById('sinistro-hora').value = draft.sinistro.hora || '';
                document.getElementById('sinistro-numero').value = draft.sinistro.numero || '';
                document.getElementById('sinistro-origem').value = draft.sinistro.origem || 'Fiscalização de rotina';
                document.getElementById('sinistro-endereco').value = draft.sinistro.endereco || '';
                document.getElementById('sinistro-caracteristica').value = draft.sinistro.caracteristica || 'Com vítima';
                document.getElementById('sinistro-sexo').value = draft.sinistro.sexo || 'Masculino';
                document.getElementById('sinistro-socorro').value = draft.sinistro.socorro || 'Sem Necessidade';
                document.getElementById('sinistro-socorro-prefixo').value = draft.sinistro.socorroPrefixo || '';
                document.getElementById('sinistro-socorro-responsavel').value = draft.sinistro.socorroResponsavel || '';
                document.getElementById('sinistro-resumo').value = draft.sinistro.resumo || '';
                document.getElementById('sinistro-agentes-select').value = draft.sinistro.agentesSelect || 'DET 08';
                document.getElementById('sinistro-agentes-custom').value = draft.sinistro.agentesCustom || '';
                document.getElementById('sinistro-vtr').value = draft.sinistro.vtr || '1390';
                document.getElementById('sinistro-supervisao').value = draft.sinistro.supervisao || '';
                document.getElementById('sinistro-responsavel').value = draft.sinistro.responsavel || '';
                document.getElementById('sinistro-matricula').value = draft.sinistro.matricula || '';
                document.getElementById('sinistro-data-final').value = draft.sinistro.dataFinal || '';

                if (draft.sinistro.envolvidos) {
                    document.getElementById('envolvidos-container').innerHTML = '';
                    draft.sinistro.envolvidos.forEach(it => addEnvolvido(it));
                }
                if (draft.sinistro.apoio) {
                    document.getElementById('apoio-container').innerHTML = '';
                    draft.sinistro.apoio.forEach(it => addApoio(it));
                }
                toggleSocorroFields();
                toggleCustomAgente();
            }

            renderSimplesList();

            if (editingId) {
                if (activeTab === 'simples') document.getElementById('edit-indicator-simples').classList.remove('hidden');
                else document.getElementById('edit-indicator-especial').classList.remove('hidden');
            }
        }

        function updateAgentNameDisplay() {
            document.getElementById('agent-name-display').textContent = agentName;
            document.getElementById('agent-name-input').value = agentName;
            updateTodayCounter();
        }

        function updateTodayCounter() {
            const today = new Date().toLocaleDateString('pt-BR');
            const count = reports.filter(r => new Date(r.timestamp).toLocaleDateString('pt-BR') === today).length;
            const counterEl = document.getElementById('today-counter');
            if (counterEl) {
                counterEl.textContent = `${count} HOJE`;
            }
        }

        function renderSelects() {
            const codigoSelect = document.getElementById('simples-codigo');
            const localSelect = document.getElementById('simples-local');
            
            const currentCodigo = codigoSelect.value;
            const currentLocal = localSelect.value;

            codigoSelect.innerHTML = '<option value="">Selecione um código...</option>';
            availableCodigos.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt;
                el.textContent = opt;
                codigoSelect.appendChild(el);
            });
            codigoSelect.innerHTML += '<option value="Outros">Outros (Escrever manualmente)</option>';

            localSelect.innerHTML = '<option value="">Selecione um local...</option>';
            availableLocais.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt;
                el.textContent = opt;
                localSelect.appendChild(el);
            });
            localSelect.innerHTML += '<option value="Outros">Outros (Escrever manualmente)</option>';

            // Restore values if they still exist in the new lists
            if ([...availableCodigos, 'Outros', ''].includes(currentCodigo)) {
                codigoSelect.value = currentCodigo;
            }
            if ([...availableLocais, 'Outros', ''].includes(currentLocal)) {
                localSelect.value = currentLocal;
            }
        }

        // --- UI ACTIONS ---
        function switchTab(tab) {
            activeTab = tab;
            localStorage.setItem('traffic_active_tab', tab);
            document.getElementById('content-simples').classList.toggle('hidden', tab !== 'simples');
            document.getElementById('content-especial').classList.toggle('hidden', tab !== 'especial');
            document.getElementById('content-historico').classList.toggle('hidden', tab !== 'historico');

            document.getElementById('tab-simples').className = tab === 'simples' ? 'active-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap' : 'inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap';
            document.getElementById('tab-especial').className = tab === 'especial' ? 'active-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap' : 'inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap';
            document.getElementById('tab-historico').className = tab === 'historico' ? 'active-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap' : 'inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap';
            
            if (tab === 'historico') renderHistory();
            lucide.createIcons();
        }

        function toggleCustomCodigo() {
            const val = document.getElementById('simples-codigo').value;
            document.getElementById('simples-custom-codigo').classList.toggle('hidden', val !== 'Outros');
        }

        function toggleCustomLocal() {
            const val = document.getElementById('simples-local').value;
            document.getElementById('simples-custom-local').classList.toggle('hidden', val !== 'Outros');
        }

        function addEnvolvido(data = null) {
            envolvidosCount++;
            const container = document.getElementById('envolvidos-container');
            const div = document.createElement('div');
            div.id = `envolvido-${envolvidosCount}`;
            div.className = 'p-4 bg-slate-800/50 rounded-2xl border border-slate-700 space-y-3 relative';
            
            const id = envolvidosCount;
            div.innerHTML = `
                <button onclick="removeEnvolvido(${id})" class="absolute top-2 right-2 text-slate-500 hover:text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Tipo de Envolvido</label>
                    <select id="envolvido-tipo-${id}" onchange="toggleEnvolvidoFields(${id})" class="w-full p-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-100 text-sm">
                        <option value="Carro 🚗">Carro 🚗</option>
                        <option value="Moto 🏍️">Moto 🏍️</option>
                        <option value="Caminhão 🚛">Caminhão 🚛</option>
                        <option value="Ônibus 🚌">Ônibus 🚌</option>
                        <option value="Ciclomotor 🛵">Ciclomotor 🛵</option>
                        <option value="Autopropelido 🛴">Autopropelido 🛴</option>
                        <option value="Bicicleta 🚲">Bicicleta 🚲</option>
                        <option value="Pedestre 🧍🏻">Pedestre 🧍🏻</option>
                        <option value="Outros">Outros (Escrever manualmente)</option>
                    </select>
                </div>
                <div id="envolvido-custom-container-${id}" class="hidden space-y-2">
                    <input type="text" id="envolvido-custom-${id}" placeholder="Especifique..." class="w-full p-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-100 text-sm">
                </div>
                <div id="envolvido-veiculo-fields-${id}" class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Placa</label>
                        <input type="text" id="envolvido-placa-${id}" class="w-full p-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-100 text-sm uppercase">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">CNH</label>
                        <input type="text" id="envolvido-cnh-${id}" class="w-full p-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-100 text-sm">
                    </div>
                </div>
            `;
            container.appendChild(div);
            if (data) {
                document.getElementById(`envolvido-tipo-${id}`).value = data.tipo;
                document.getElementById(`envolvido-custom-${id}`).value = data.custom || '';
                document.getElementById(`envolvido-placa-${id}`).value = data.placa || '';
                document.getElementById(`envolvido-cnh-${id}`).value = data.cnh || '';
            }
            toggleEnvolvidoFields(id);
            lucide.createIcons();
            saveDraft();
        }

        function removeEnvolvido(id) {
            document.getElementById(`envolvido-${id}`).remove();
            saveDraft();
        }

        function toggleEnvolvidoFields(id) {
            const tipo = document.getElementById(`envolvido-tipo-${id}`).value;
            const veiculos = ["Carro 🚗", "Moto 🏍️", "Caminhão 🚛", "Ônibus 🚌", "Ciclomotor 🛵"];
            document.getElementById(`envolvido-veiculo-fields-${id}`).classList.toggle('hidden', !veiculos.includes(tipo));
            document.getElementById(`envolvido-custom-container-${id}`).classList.toggle('hidden', tipo !== 'Outros');
            saveDraft();
        }

        function addApoio(data = null) {
            apoioCount++;
            const container = document.getElementById('apoio-container');
            const div = document.createElement('div');
            div.id = `apoio-${apoioCount}`;
            div.className = 'p-4 bg-slate-800/50 rounded-2xl border border-slate-700 space-y-3 relative';
            
            const id = apoioCount;
            div.innerHTML = `
                <button onclick="removeApoio(${id})" class="absolute top-2 right-2 text-slate-500 hover:text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Tipo de Apoio</label>
                    <select id="apoio-tipo-${id}" class="w-full p-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-100 text-sm">
                        <option value="PM">PM</option>
                        <option value="GCM">GCM</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Prefixo VTR</label>
                        <input type="text" id="apoio-prefixo-${id}" class="w-full p-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-100 text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Responsável</label>
                        <input type="text" id="apoio-responsavel-${id}" class="w-full p-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-100 text-sm">
                    </div>
                </div>
            `;
            container.appendChild(div);
            if (data) {
                document.getElementById(`apoio-tipo-${id}`).value = data.tipo;
                document.getElementById(`apoio-prefixo-${id}`).value = data.prefixo || '';
                document.getElementById(`apoio-responsavel-${id}`).value = data.responsavel || '';
            }
            lucide.createIcons();
            saveDraft();
        }

        function removeApoio(id) {
            document.getElementById(`apoio-${id}`).remove();
            saveDraft();
        }

        function toggleSocorroFields() {
            const val = document.getElementById('sinistro-socorro').value;
            document.getElementById('socorro-vtr-fields').classList.toggle('hidden', val !== 'SAMU' && val !== 'RESGATE');
            saveDraft();
        }

        function toggleCustomAgente() {
            const val = document.getElementById('sinistro-agentes-select').value;
            document.getElementById('sinistro-agentes-custom').classList.toggle('hidden', val !== 'Outros');
            saveDraft();
        }

        function toggleEspecialFields() {
            const tipo = document.getElementById('especial-tipo').value;
            const isSinistro = tipo === 'Sinistro de trânsito';
            document.getElementById('sinistro-fields').classList.toggle('hidden', !isSinistro);
            document.getElementById('generic-especial-fields').classList.toggle('hidden', isSinistro);
            
            if (isSinistro && document.getElementById('envolvidos-container').children.length === 0) {
                addEnvolvido();
                addEnvolvido();
                addApoio();
            }
            saveDraft();
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

        function handleSaveReport() {
            let data = {};
            if (activeTab === 'simples') {
                const codigoSelect = document.getElementById('simples-codigo').value;
                const customCodigo = document.getElementById('simples-custom-codigo').value;
                const localSelect = document.getElementById('simples-local').value;
                const customLocal = document.getElementById('simples-custom-local').value;
                const finalCodigo = codigoSelect === 'Outros' ? customCodigo : codigoSelect;
                const finalLocal = localSelect === 'Outros' ? customLocal : localSelect;

                const finalItems = [...simplesList];
                if (finalCodigo && finalLocal) finalItems.push({ codigo: finalCodigo, local: finalLocal });
                if (finalItems.length === 0) return showToast('Adicione ocorrências.', 'error');
                
                data = { items: finalItems };
            } else {
                const tipo = document.getElementById('especial-tipo').value;
                if (tipo === 'Sinistro de trânsito') {
                    const sinistroData = {
                        data: document.getElementById('sinistro-data').value,
                        hora: document.getElementById('sinistro-hora').value,
                        numero: document.getElementById('sinistro-numero').value,
                        origem: document.getElementById('sinistro-origem').value,
                        endereco: document.getElementById('sinistro-endereco').value,
                        caracteristica: document.getElementById('sinistro-caracteristica').value,
                        sexo: document.getElementById('sinistro-sexo').value,
                        socorro: document.getElementById('sinistro-socorro').value,
                        socorroPrefixo: document.getElementById('sinistro-socorro-prefixo').value,
                        socorroResponsavel: document.getElementById('sinistro-socorro-responsavel').value,
                        resumo: document.getElementById('sinistro-resumo').value,
                        agentesSelect: document.getElementById('sinistro-agentes-select').value,
                        agentesCustom: document.getElementById('sinistro-agentes-custom').value,
                        vtr: document.getElementById('sinistro-vtr').value,
                        supervisao: document.getElementById('sinistro-supervisao').value,
                        responsavel: document.getElementById('sinistro-responsavel').value,
                        matricula: document.getElementById('sinistro-matricula').value,
                        dataFinal: document.getElementById('sinistro-data-final').value,
                        envolvidos: Array.from(document.getElementById('envolvidos-container').children).map(div => {
                            const id = div.id.split('-')[1];
                            return {
                                tipo: document.getElementById(`envolvido-tipo-${id}`).value,
                                custom: document.getElementById(`envolvido-custom-${id}`).value,
                                placa: document.getElementById(`envolvido-placa-${id}`).value,
                                cnh: document.getElementById(`envolvido-cnh-${id}`).value
                            };
                        }),
                        apoio: Array.from(document.getElementById('apoio-container').children).map(div => {
                            const id = div.id.split('-')[1];
                            return {
                                tipo: document.getElementById(`apoio-tipo-${id}`).value,
                                prefixo: document.getElementById(`apoio-prefixo-${id}`).value,
                                responsavel: document.getElementById(`apoio-responsavel-${id}`).value
                            };
                        })
                    };
                    if (!sinistroData.data || !sinistroData.hora || !sinistroData.endereco) {
                        return showToast('Preencha os campos obrigatórios (Data, Hora, Endereço).', 'error');
                    }
                    data = { tipo, ...sinistroData };
                } else {
                    const desc = document.getElementById('especial-descricao').value;
                    const loc = document.getElementById('especial-local').value;
                    if (!desc || !loc) return showToast('Preencha os campos.', 'error');
                    data = { tipo, descricao: desc, local: loc };
                }
            }

            const report = {
                id: editingId || Math.random().toString(36).substring(2),
                type: activeTab,
                data: data,
                agent: agentName,
                timestamp: Date.now()
            };

            if (editingId) {
                reports = reports.map(r => r.id === editingId ? report : r);
            } else {
                reports.unshift(report);
            }

            localStorage.setItem('traffic_reports', JSON.stringify(reports));
            localStorage.removeItem('traffic_form_draft');
            localStorage.removeItem('traffic_simples_list_draft');
            localStorage.removeItem('traffic_editing_id');
            showToast(editingId ? 'Atualizado!' : 'Salvo localmente!');
            updateTodayCounter();
            handleClear();
        }

        // --- HISTORY ---
        function renderHistory() {
            const list = document.getElementById('history-list');
            const count = document.getElementById('history-count');
            count.textContent = reports.length;

            if (reports.length === 0) {
                list.innerHTML = `
                    <div class="bg-slate-900 rounded-2xl p-10 text-center border-2 border-dashed border-slate-800">
                        <i data-lucide="history" class="w-12 h-12 text-slate-700 mx-auto mb-4"></i>
                        <p class="text-slate-500 font-medium">Nenhum registro encontrado.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const groups = {};
            reports.forEach(r => {
                const date = new Date(r.timestamp).toLocaleDateString('pt-BR');
                if (!groups[date]) groups[date] = { simples: [], especial: [] };
                if (r.type === 'simples') groups[date].simples.push(r);
                else groups[date].especial.push(r);
            });

            list.innerHTML = '';
            Object.entries(groups).sort((a,b) => {
                const [da, ma, ya] = a[0].split('/');
                const [db, mb, yb] = b[0].split('/');
                return new Date(`${yb}-${mb}-${db}`) - new Date(`${ya}-${ma}-${da}`);
            }).forEach(([date, grp]) => {
                const dateDiv = document.createElement('div');
                dateDiv.className = 'space-y-3';
                dateDiv.innerHTML = `
                    <div class="flex items-center gap-3 px-2">
                        <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>
                        <span class="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">${date}</span>
                        <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>
                    </div>
                `;

                if (grp.simples.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-3xl p-5 shadow-2xl space-y-4 border-l-4 border-l-indigo-500/50';
                    const allItems = grp.simples.flatMap(r => r.data.items || []);
                    const ids = grp.simples.map(r => r.id).join(',');
                    
                    let itemsHtml = '';
                    grp.simples.sort((a,b) => b.timestamp - a.timestamp).forEach(r => {
                        itemsHtml += `
                            <div class="space-y-2">
                                <div class="flex justify-end items-center">
                                    <div class="flex gap-2">
                                        <button onclick="editReport('${r.id}')" class="text-[9px] text-indigo-400 font-bold uppercase">Editar</button>
                                        <button onclick="openConfirm('${r.id}')" class="text-[9px] text-red-400 font-bold uppercase">Remover</button>
                                    </div>
                                </div>
                                <div class="text-[10px] text-slate-400 bg-slate-800/50 p-3 rounded-xl border border-slate-800 space-y-1">
                                    ${r.data.items.map(it => `<div class="flex justify-between"><span class="font-bold text-slate-300">${it.codigo}</span><span class="truncate ml-2 text-slate-500">${it.local}</span></div>`).join('')}
                                </div>
                            </div>
                        `;
                    });

                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded-full bg-indigo-500/10 text-indigo-400">Ocorrências Simples</span>
                            <button onclick="openConfirm('${ids}')" class="p-1 text-slate-600 hover:text-red-400 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <div class="space-y-4">${itemsHtml}</div>
                        <button onclick="sendWhatsAppBulk('${date}')" class="w-full bg-green-600/10 text-green-400 py-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2 hover:bg-green-600/20 transition-all border border-green-600/20">
                            <i data-lucide="send" class="w-3 h-3"></i> Enviar Tudo (${date})
                        </button>
                    `;
                    dateDiv.appendChild(card);
                }

                grp.especial.sort((a,b) => b.timestamp - a.timestamp).forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-3xl p-5 shadow-2xl space-y-3 border-l-4 border-l-amber-500/50';
                    
                    let contentHtml = '';
                    if (r.data.tipo === 'Sinistro de trânsito') {
                        contentHtml = `
                            <div class="space-y-1">
                                <p class="font-bold text-slate-200">N° ${r.data.numero || 'S/N'}</p>
                                <p class="text-sm text-slate-400 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${r.data.endereco}</p>
                                <p class="text-[10px] text-slate-500 uppercase font-bold">${r.data.data} às ${r.data.hora}</p>
                            </div>
                        `;
                    } else {
                        contentHtml = `
                            <div class="space-y-1">
                                <p class="font-bold text-slate-200">${r.data.descricao}</p>
                                <p class="text-sm text-slate-400 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${r.data.local}</p>

                    card.innerHTML = `
                        <div class="flex justify-between items-start">

                list.appendChild(dateDiv);
            });
            lucide.createIcons();
        }

            if (!r) return;
            editingId = id;
            activeTab = r.type;
            saveDraft();
            switchTab(r.type);
            if (r.type === 'simples') {
                simplesList = [...r.data.items];
                renderSimplesList();
                document.getElementById('edit-indicator-simples').classList.remove('hidden');

                document.getElementById('especial-tipo').value = r.data.tipo;

                        resumo: document.getElementById('sinistro-resumo').value,
                        agentesSelect: document.getElementById('sinistro-agentes-select').value,
                        agentesCustom: document.getElementById('sinistro-agentes-custom').value,
                        vtr: document.getElementById('sinistro-vtr').value,
                        supervisao: document.getElementById('sinistro-supervisao').value,
                        responsavel: document.getElementById('sinistro-responsavel').value,
                        matricula: document.getElementById('sinistro-matricula').value,
                        dataFinal: document.getElementById('sinistro-data-final').value,
                        envolvidos: Array.from(document.getElementById('envolvidos-container').children).map(div => {
                            const id = div.id.split('-')[1];
                            return {
                                tipo: document.getElementById(`envolvido-tipo-${id}`).value,
                                custom: document.getElementById(`envolvido-custom-${id}`).value,
                                placa: document.getElementById(`envolvido-placa-${id}`).value,
                                cnh: document.getElementById(`envolvido-cnh-${id}`).value
                            };
                        }),
                        apoio: Array.from(document.getElementById('apoio-container').children).map(div => {
                            const id = div.id.split('-')[1];
                            return {
                                tipo: document.getElementById(`apoio-tipo-${id}`).value,
                                prefixo: document.getElementById(`apoio-prefixo-${id}`).value,
                                responsavel: document.getElementById(`apoio-responsavel-${id}`).value
                            };
                        })
                    });
                } else {
                    const desc = document.getElementById('especial-descricao').value;
                    const loc = document.getElementById('especial-local').value;
                    if (!desc || !loc) return showToast('Preencha os campos.', 'error');
                    message = `*REGISTRO DE OCORRÊNCIAS*\n*Agente:* ${agentName}\n\n*OCORRÊNCIA ESPECIAL*\n\n*Tipo:* ${tipo}\n*Descrição:* ${desc}\n*Local:* ${loc}`;
                }
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function sendWhatsAppSingle(id) {
            const r = reports.find(x => x.id === id);
            if (!r) return;
            let message = '';
            const reportAgent = r.agent || agentName;
            if (r.type === 'simples') {
                message = formatSimplesMessage(r.data.items, reportAgent);
            } else {
                if (r.data.tipo === 'Sinistro de trânsito') {
                    message = formatSinistroMessage(r.data);
                } else {
                    message = `*REGISTRO DE OCORRÊNCIAS*\n*Agente:* ${reportAgent}\n\n*OCORRÊNCIA ESPECIAL*\n\n*Tipo:* ${r.data.tipo}\n*Descrição:* ${r.data.descricao}\n*Local:* ${r.data.local}`;
                }
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function formatSinistroMessage(d) {
            let message = `*RELATÓRIO DE SINISTRO DE TRÂNSITO*\n\n`;
            message += `*Data:* ${d.data}\n*Hora:* ${d.hora}\n*N° Ocorrência:* ${d.numero}\n*Origem:* ${d.origem}\n*Endereço:* ${d.endereco}\n`;
            message += `*Característica:* ${d.caracteristica}\n*Sexo:* ${d.sexo}\n\n`;
            
            message += `*ENVOLVIDOS:*\n`;
            d.envolvidos.forEach((env, i) => {
                const tipoFinal = env.tipo === 'Outros' ? env.custom : env.tipo;
                message += `${i+1}. ${tipoFinal}`;
                if (env.placa) message += ` | Placa: ${env.placa}`;
                if (env.cnh) message += ` | CNH: ${env.cnh}`;
                message += `\n`;
            });

            message += `\n*SOCORRO MÉDICO:* ${d.socorro}\n`;
            if (d.socorro === 'SAMU' || d.socorro === 'RESGATE') {
                message += `*Prefixo VTR:* ${d.socorroPrefixo}\n*Responsável:* ${d.socorroResponsavel}\n`;
            }

            if (d.apoio && d.apoio.length > 0) {
                message += `\n*APOIO POLICIAL:*\n`;
                d.apoio.forEach((ap, i) => {
                    message += `${i+1}. ${ap.tipo} | VTR: ${ap.prefixo} | Resp: ${ap.responsavel}\n`;
                });
            }

            message += `\n*RESUMO DOS FATOS:* ${d.resumo}\n\n`;
            
            const agenteFinal = d.agentesSelect === 'Outros' ? d.agentesCustom : d.agentesSelect;
            message += `*Agentes:* ${agenteFinal}\n*VTR:* ${d.vtr}\n*Supervisão:* ${d.supervisao}\n`;
            message += `*Responsável pelo Relatório:* ${d.responsavel}\n*Matrícula:* ${d.matricula}\n*Data:* ${d.dataFinal}`;
            return message;
        }

        function sendWhatsAppBulk(date) {
            const dayReports = reports.filter(r => new Date(r.timestamp).toLocaleDateString('pt-BR') === date && r.type === 'simples');
            const allItems = dayReports.flatMap(r => r.data.items);
            const message = formatSimplesMessage(allItems, agentName);
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function formatSimplesMessage(items, name) {
            const currentAgent = name || agentName;
            const grouped = {};
            items.forEach(it => {
                if (!grouped[it.codigo]) grouped[it.codigo] = [];
                grouped[it.codigo].push(it.local);
            });
            let msg = `*REGISTRO DE OCORRÊNCIAS*\n*Agente:* ${currentAgent}\n\n*OCORRÊNCIAS SIMPLES*\n`;
            Object.keys(grouped).forEach(cod => {
                msg += `\n*Código:* ${cod}\n*Locais:*`;
                grouped[cod].forEach(loc => msg += `\n- ${loc}`);
                msg += `\n`;
            });
            return msg;
        }

        init();
    </script>
</body>
</html>
