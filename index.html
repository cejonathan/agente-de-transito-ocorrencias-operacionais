<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agente Trânsito - Registro Operacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .active-tab { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .inactive-tab { color: #64748b; }
        .bg-light-gradient { background: radial-gradient(circle at top right, #f8fafc 0%, #e2e8f0 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(20px); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen bg-light-gradient text-slate-900 pb-24">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-0 left-1/2 -translate-x-1/2 z-[100] w-full max-w-xs pointer-events-none"></div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/40 backdrop-blur-md z-[110] hidden items-center justify-center p-6">
        <div class="glass-card rounded-3xl p-8 max-w-xs w-full text-center space-y-6 shadow-2xl">
            <div class="bg-indigo-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="trash-2" class="w-8 h-8 text-indigo-600"></i>
            </div>
            <div class="space-y-2">
                <h3 class="text-xl font-black text-slate-900">Excluir Registro?</h3>
                <p class="text-slate-500 text-sm">Esta ação não pode ser desfeita e o registro será removido do histórico.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-4 rounded-2xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors border border-slate-200">Cancelar</button>
                <button id="confirm-delete-btn" class="flex-1 py-4 rounded-2xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-lg shadow-red-900/20 transition-colors">Excluir</button>
            </div>
        </div>
    </div>

    <!-- Local Modal -->
    <div id="local-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeLocalModal()"></div>
        <div class="relative w-full max-w-md glass-card rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-5 h-5 text-indigo-600"></i> Novo Local
                    </h3>
                    <button onclick="closeLocalModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                    </button>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Nome do Local</label>
                    <input id="new-local-input" type="text" placeholder="Ex: Rua das Flores, 123" class="w-full p-4 bg-white border-2 border-slate-200 rounded-2xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-all text-slate-900 placeholder:text-slate-400">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeLocalModal()" class="flex-1 py-4 rounded-2xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors border border-slate-200">Cancelar</button>
                    <button onclick="confirmNewLocal()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-900/40 hover:bg-indigo-500 active:scale-95 transition-all">Adicionar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Manage Options Modal -->
    <div id="manage-options-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeManageOptionsModal()"></div>
        <div class="relative w-full max-w-md glass-card rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between shrink-0">
                <h3 id="manage-options-title" class="text-xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="settings" class="w-5 h-5 text-indigo-600"></i> Gerenciar Opções
                </h3>
                <button onclick="closeManageOptionsModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                </button>
            </div>
            <div class="p-6 space-y-4 overflow-y-auto custom-scrollbar flex-1">
                <div class="flex gap-2">
                    <input id="new-option-input" type="text" placeholder="Nova opção..." class="flex-1 p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:outline-none font-medium transition-all text-slate-900 placeholder:text-slate-400">
                    <button onclick="addNewOption()" class="bg-indigo-600 text-white p-3 rounded-xl active:scale-95 transition-all shadow-lg shadow-indigo-900/40">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="options-list" class="space-y-2">
                    <!-- Options will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md text-slate-900 p-6 shadow-sm sticky top-0 z-20 border-b border-slate-200">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600/10 p-2 rounded-lg">
                    <i data-lucide="user" class="w-6 h-6 text-indigo-600"></i>
                </div>
                <div>
                    <h1 id="agent-name-display" class="text-xl font-bold leading-tight text-slate-900">Agente Trânsito</h1>
                    <div class="flex items-center gap-2">
                        <p class="text-indigo-600 text-[10px] uppercase tracking-widest font-bold">Registro Operacional</p>
                        <span id="today-counter" class="bg-indigo-500/10 text-indigo-600 text-[9px] px-1.5 py-0.5 rounded-full font-black border border-indigo-500/20">0 HOJE</span>
                        <span id="storage-usage" class="text-[9px] font-black uppercase tracking-tighter">0.00MB / 5MB</span>
                    </div>
                </div>
            </div>
            <button onclick="openNameModal()" id="edit-name-btn" class="text-xs bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-full font-bold uppercase transition-colors flex items-center gap-1 text-slate-600 border border-slate-200">
                <i data-lucide="edit-2" class="w-3 h-3"></i> Edit
            </button>
        </div>
    </header>

    <!-- Name Modal -->
    <div id="name-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeNameModal()"></div>
        <div class="relative w-full max-w-md glass-card rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                        <i data-lucide="user" class="w-5 h-5 text-indigo-600"></i> Nome do Agente
                    </h3>
                    <button onclick="closeNameModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                    </button>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Seu Nome</label>
                    <input id="agent-name-input" type="text" placeholder="Digite seu nome..." class="w-full p-4 bg-white border-2 border-slate-200 rounded-2xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-all text-slate-900 placeholder:text-slate-400">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeNameModal()" class="flex-1 py-4 rounded-2xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors border border-slate-200">Cancelar</button>
                    <button onclick="saveAgentName()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-900/40 hover:bg-indigo-500 active:scale-95 transition-all">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-3 sm:p-4 space-y-4 sm:space-y-6">
        <!-- Tabs -->
        <div class="flex glass-card p-1.5 rounded-2xl shadow-2xl overflow-x-auto no-scrollbar">
            <button onclick="switchTab('simples')" id="tab-simples" class="active-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap uppercase">
                <i data-lucide="clipboard-list" class="w-4 h-4"></i> SIMPLES
            </button>
            <button onclick="switchTab('especial')" id="tab-especial" class="inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap uppercase">
                <i data-lucide="star" class="w-4 h-4"></i> ESPECIAL
            </button>
            <button onclick="switchTab('historico')" id="tab-historico" class="inactive-tab flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap uppercase">
                <i data-lucide="history" class="w-4 h-4"></i> HISTÓRICO
            </button>
        </div>

        <!-- Form Simples -->
        <div id="content-simples" class="space-y-4 sm:space-y-6">
            <div class="glass-card rounded-3xl p-4 sm:p-6 shadow-lg space-y-4 sm:space-y-5">
                <div id="edit-indicator-simples" class="hidden p-3 bg-indigo-500/10 border border-indigo-500/20 rounded-xl flex items-center justify-between">
                    <span class="text-xs font-bold text-indigo-600 uppercase tracking-tight flex items-center gap-2">
                        <i data-lucide="edit-2" class="w-3 h-3"></i> Editando Registro
                    </span>
                    <button onclick="handleClear()" class="text-[10px] font-black text-indigo-600 uppercase">Cancelar</button>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-500 uppercase flex items-center justify-between gap-2">
                        <span class="flex items-center gap-2"><i data-lucide="hash" class="w-4 h-4"></i> Código</span>
                        <button onclick="openManageOptionsModal('codigo')" class="text-indigo-600 hover:text-indigo-500 transition-colors p-1">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                        </button>
                    </label>
                    <select id="simples-codigo" onchange="toggleCustomCodigo()" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors appearance-none text-slate-900">
                        <option value="">Selecione um código...</option>
                    </select>
                    <input id="simples-custom-codigo" type="text" placeholder="Digite o código manualmente..." class="hidden w-full p-4 mt-2 bg-white border-2 border-indigo-500/50 rounded-xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors text-slate-900">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-500 uppercase flex items-center justify-between gap-2">
                        <span class="flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> Local</span>
                        <button onclick="openManageOptionsModal('local')" class="text-indigo-600 hover:text-indigo-500 transition-colors p-1">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                        </button>
                    </label>
                    <div class="flex gap-2">
                        <select id="simples-local" onchange="toggleCustomLocal()" class="flex-1 min-w-0 p-3 sm:p-4 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:outline-none text-base sm:text-lg font-medium transition-colors appearance-none text-slate-900">
                            <option value="">Selecione um local...</option>
                        </select>
                        <button onclick="openLocalModal()" class="bg-indigo-600/10 text-indigo-600 p-3 sm:p-4 rounded-xl active:scale-95 transition-all border-2 border-indigo-500/20 hover:bg-indigo-600/20 shrink-0">
                            <i data-lucide="plus" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                        </button>
                    </div>
                    <input id="simples-custom-local" type="text" placeholder="Digite o local manually..." class="hidden w-full p-3 sm:p-4 mt-2 bg-white border-2 border-indigo-500/50 rounded-xl focus:border-indigo-500 focus:outline-none text-base sm:text-lg font-medium transition-colors text-slate-900">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-1">
                            <i data-lucide="clock" class="w-3 h-3"></i> Hora Inicial
                        </label>
                        <input type="time" id="simples-hora-inicial" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:outline-none text-sm font-bold transition-colors text-slate-900">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-1">
                            <i data-lucide="clock" class="w-3 h-3"></i> Hora Final
                        </label>
                        <input type="time" id="simples-hora-final" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:outline-none text-sm font-bold transition-colors text-slate-900">
                    </div>
                </div>

                <button onclick="handleAddSimplesItem()" class="w-full bg-indigo-600 text-white py-3 sm:py-4 rounded-xl font-bold uppercase shadow-lg shadow-indigo-900/40 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm sm:text-base">
                    <i data-lucide="plus" class="w-4 h-4 sm:w-5 sm:h-5"></i> Adicionar Ocorrência
                </button>

                <div id="simples-list-container" class="hidden space-y-2 pt-4 border-t border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Itens na Lista (<span id="simples-list-count">0</span>)</p>
                    <div id="simples-items-list" class="space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="handleSaveReport()" class="w-full bg-indigo-600 text-white py-3 sm:py-4 rounded-xl font-bold uppercase shadow-lg shadow-indigo-900/40 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm sm:text-base">
                    <i data-lucide="save" class="w-4 h-4 sm:w-5 sm:h-5"></i> Salvar
                </button>
            </div>
        </div>

        <!-- Form Especial -->
        <div id="content-especial" class="hidden space-y-4 sm:space-y-6">
            <div class="glass-card rounded-3xl p-4 sm:p-6 shadow-lg space-y-4 sm:space-y-5">
                <div id="edit-indicator-especial" class="hidden p-3 bg-indigo-500/10 border border-indigo-500/20 rounded-xl flex items-center justify-between">
                    <span class="text-xs font-bold text-indigo-600 uppercase tracking-tight flex items-center gap-2">
                        <i data-lucide="edit-2" class="w-3 h-3"></i> Editando Registro
                    </span>
                    <button onclick="handleClear()" class="text-[10px] font-black text-indigo-600 uppercase">Cancelar</button>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-500 uppercase flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4"></i> Tipo de Ocorrência
                    </label>
                    <select id="especial-tipo" onchange="toggleEspecialFields()" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors appearance-none text-slate-900">
                        <option value="">Selecionar...</option>
                        <option value="Sinistro de trânsito">Sinistro de trânsito</option>
                        <option value="Remoção de veículo">Remoção de veículo</option>
                        <option value="Remoção de veículo em estado de abandono">Remoção de veículo em estado de abandono</option>
                        <option value="Relatório de fiscalização">Relatório de fiscalização</option>
                        <option value="Buraco na via">Buraco na via</option>
                    </select>
                </div>

                <div id="generic-especial-fields" class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-500 uppercase flex items-center gap-2">
                            <i data-lucide="file-text" class="w-4 h-4"></i> Descrição
                        </label>
                        <textarea id="especial-descricao" placeholder="Descreva a situação..." rows="3" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors text-slate-900"></textarea>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-500 uppercase flex items-center gap-2">
                            <i data-lucide="map-pin" class="w-4 h-4"></i> Local
                        </label>
                        <input id="especial-local" type="text" placeholder="Ex: Cruzamento X com Y" class="w-full p-4 bg-white border-2 border-slate-200 rounded-2xl focus:border-indigo-500 focus:outline-none text-lg font-medium transition-colors text-slate-900">
                    </div>
                </div>

                <!-- Sinistro de Trânsito Fields -->
                <div id="sinistro-fields" class="hidden space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Data</label>
                            <input type="date" id="sinistro-data" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Hora</label>
                            <input type="time" id="sinistro-hora" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">N° Ocorrência</label>
                            <input type="text" id="sinistro-numero" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900" placeholder="Ex: 123/2024">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Origem</label>
                            <select id="sinistro-origem" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900">
                                <option value="">Selecionar...</option>
                                <option value="Fiscalização de rotina">Fiscalização de rotina</option>
                                <option value="COTRAN">COTRAN</option>
                                <option value="COI">COI</option>
                                <option value="CECOM">CECOM</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Endereço</label>
                        <input type="text" id="sinistro-endereco" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900" placeholder="Rua, Número, Bairro...">
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Característica do sinistro</label>
                        <select id="sinistro-caracteristica" onchange="toggleVitimaFields()" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900">
                            <option value="">Selecionar...</option>
                            <option value="Com vítima">Com vítima</option>
                            <option value="Sem vítima">Sem vítima</option>
                        </select>
                    </div>

                    <div id="vitimas-section" class="hidden space-y-4 p-4 bg-slate-50 rounded-2xl border border-slate-200">
                        <div class="flex items-center justify-between">
                            <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Vítimas</h4>
                            <button onclick="addVitima()" class="text-indigo-600 hover:text-indigo-500 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase">
                                <i data-lucide="plus" class="w-3 h-3"></i> Adicionar Vítima
                            </button>
                        </div>
                        <div id="vitimas-container" class="space-y-3"></div>
                    </div>

                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <label class="text-xs font-bold text-slate-500 uppercase">Envolvidos</label>
                            <button onclick="addEnvolvido()" class="text-indigo-600 hover:text-indigo-500 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase">
                                <i data-lucide="plus" class="w-3 h-3"></i> Adicionar Veículo
                            </button>
                        </div>
                        <div id="envolvidos-container" class="space-y-3"></div>
                    </div>

                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <label class="text-xs font-bold text-slate-500 uppercase">Apoio Policial</label>
                            <button onclick="addApoio()" class="text-indigo-600 hover:text-indigo-500 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase">
                                <i data-lucide="plus" class="w-3 h-3"></i> Adicionar Apoio
                            </button>
                        </div>
                        <div id="apoio-container" class="space-y-3"></div>
                    </div>

                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <label class="text-xs font-bold text-slate-500 uppercase">Socorro Médico</label>
                            <button onclick="addSocorro()" class="text-indigo-600 hover:text-indigo-500 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase">
                                <i data-lucide="plus" class="w-3 h-3"></i> Adicionar Socorro
                            </button>
                        </div>
                        <div id="socorro-container" class="space-y-3"></div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Resumo dos Fatos</label>
                        <textarea id="sinistro-resumo" rows="3" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900" placeholder="Descreva os detalhes do sinistro..."></textarea>
                    </div>

                    <div class="space-y-3 p-4 bg-white rounded-2xl border-2 border-slate-200 shadow-sm">
                        <div class="flex items-center justify-between">
                            <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">Agentes Envolvidos</label>
                            <button onclick="addAgenteSinistro()" class="text-indigo-600 hover:text-indigo-500 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase bg-indigo-50 px-2 py-1 rounded-lg border border-indigo-100">
                                <i data-lucide="plus" class="w-3 h-3"></i> Adicionar Agente
                            </button>
                        </div>
                        <div id="sinistro-agentes-container" class="space-y-2"></div>
                    </div>

                    <div class="space-y-3 p-4 bg-white rounded-2xl border-2 border-slate-200 shadow-sm">
                        <div class="flex items-center justify-between">
                            <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">VTRs</label>
                            <button onclick="addVtrSinistro()" class="text-indigo-600 hover:text-indigo-500 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase bg-indigo-50 px-2 py-1 rounded-lg border border-indigo-100">
                                <i data-lucide="plus" class="w-3 h-3"></i> Adicionar VTR
                            </button>
                        </div>
                        <div id="sinistro-vtrs-container" class="space-y-2"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 items-start">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Supervisão</label>
                            <input type="text" id="sinistro-supervisao" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase leading-tight">Responsável pelo Relatório</label>
                            <select id="sinistro-responsavel-select" onchange="toggleSinistroResponsavelCustom()" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900">
                                <option value="">Selecionar...</option>
                                <option value="Outros">Outros</option>
                            </select>
                            <input type="text" id="sinistro-responsavel-custom" class="hidden mt-2 w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900" placeholder="Nome do responsável...">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 items-start">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Matrícula</label>
                            <input type="text" id="sinistro-matricula" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase leading-tight">Data do Relatório</label>
                            <input type="date" id="sinistro-data-final" class="w-full p-3 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 text-slate-900">
                        </div>
                    </div>

                    <div class="space-y-3 p-4 bg-slate-50 rounded-2xl border border-slate-200">
                        <div class="flex items-center justify-between">
                            <label class="text-xs font-bold text-slate-500 uppercase">Fotos do Sinistro</label>
                            <label class="cursor-pointer text-indigo-600 hover:text-indigo-500 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase">
                                <i data-lucide="image" class="w-3 h-3"></i> Anexar Fotos
                                <input type="file" id="sinistro-photo-input" accept="image/*" multiple class="hidden" onchange="handlePhotoUpload(event)">
                            </label>
                        </div>
                        <div id="sinistro-photos-container" class="grid grid-cols-3 gap-2"></div>
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap gap-3">
                <button onclick="handleSaveReport()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> Salvar
                </button>
                <button id="btn-gerar-pdf" onclick="generateSinistroPDF()" class="hidden w-full bg-slate-800 text-white py-4 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="file-text" class="w-5 h-5"></i> Gerar PDF
                </button>
                <button onclick="handleClear()" class="w-full bg-slate-100 text-slate-500 py-3 rounded-xl font-bold uppercase text-xs active:scale-95 transition-all flex items-center justify-center gap-2 border border-slate-200">
                    <i data-lucide="eraser" class="w-4 h-4"></i> Limpar Formulário
                </button>
            </div>
        </div> <!-- End of content-ocorrencias -->
        <div id="content-historico" class="hidden space-y-4">
            <div class="flex items-center justify-between px-2">
                <h2 class="font-black text-slate-500 uppercase text-xs tracking-widest">Registros Salvos (<span id="history-count">0</span>)</h2>
                <div class="flex gap-3">
                    <button onclick="clearAllPhotos()" class="text-[10px] font-bold text-amber-600 uppercase flex items-center gap-1 hover:text-amber-500 transition-colors">
                        <i data-lucide="image-off" class="w-3 h-3"></i> Limpar Fotos
                    </button>
                    <button onclick="openClearHistoryConfirm()" class="text-[10px] font-bold text-red-500 uppercase flex items-center gap-1 hover:text-red-400 transition-colors">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> Limpar Tudo
                    </button>
                </div>
            </div>
            <div id="history-list" class="space-y-6"></div>
        </div>
    </main>

    <!-- PDF Report Container (Hidden) -->
    <div id="pdf-report-container" class="hidden fixed -left-[9999px] -top-[9999px] bg-white"></div>

    <script>
        // --- CONSTANTS ---
        const CODIGOS_DEFAULT = [
            "1 Acompanhamento de alunos", "2 Apoio em obras", "3 Apoio em eventos", "4 Apoio ao agente de trânsito",
            "5 Acompanhamento de veículos (escolta)", "6 Fiscalização de caminhão", "7 COI", "8 Ação educativa",
            "9 Autorização de Caçamba/Caminhão", "10 Apoio órgão público/EDP/Telefonia", "11 Monitoramento",
            "12 Sinistro de trânsito sem vítima", "13 Sinistro de trânsito com vítima", "14 Animais na pista",
            "15 Trabalho administrativo", "16 Transporte interno", "17 Solicitação de munícipe", "18 Operação em semáforo",
            "19 Fiscalização em circulação", "20 Apoio a veículo quebrado", "21 Travessia de alunos", "22 Apoio a feira livre",
            "23 Desvio de trânsito", "24 Deslocamento ao centro do servidor", "25 Apoio a eventos religiosos",
            "26 Aferição de radar", "27 Autorizar veículos a passar no vermelho", "28 Manutenção da VTR", "29 Obra SAAE",
            "30 Remoção de veículo", "31 Remoção de veículo abandonado", "32 Apoio a pintura", "33 Apoio a poda de árvore",
            "34 Apoio a troca de poste/Recolha de fios caídos", "35 Deslocamento para diretoria de trânsito",
            "36 Deslocamento limpar VTR", "37 Blitz", "38 Fiscalização em extensão", "39 Controle de fluxo",
            "40 Fiscalização em ponto fixo", "41 Posturas", "42 Vistoria"
        ];
        const LOCAIS_DEFAULT = Array.from({ length: 15 }, (_, i) => `Setor ${i + 1}`);
        const DET_CODES = ["02", "03", "06", "07", "08", "10", "12", "17", "18", "20", "22", "35", "41", "44", "46", "47", "49", "54", "59", "61", "62", "65", "68", "75", "86", "89"];
        const VTR_CODES = ["AL 1389", "AL 1390", "AL 1393", "AL 1394", "AL 1395", "MH 01", "MH 02", "MH 03", "MH 04", "MH 05", "MH 06", "MH 07", "MH 08"];

        // --- STATE ---
        let activeTab = localStorage.getItem('traffic_active_tab') || 'simples';
        let reports = JSON.parse(localStorage.getItem('traffic_reports') || '[]');
        let availableCodigos = JSON.parse(localStorage.getItem('traffic_available_codigos') || JSON.stringify(CODIGOS_DEFAULT));
        let availableLocais = JSON.parse(localStorage.getItem('traffic_available_locais') || JSON.stringify(LOCAIS_DEFAULT));
        let agentName = localStorage.getItem('traffic_agent_name') || 'Agente Trânsito';
        let simplesList = JSON.parse(localStorage.getItem('traffic_simples_list_draft') || '[]');
        let editingId = localStorage.getItem('traffic_editing_id') || null;
        let manageType = 'codigo'; // 'codigo' or 'local'
        let envolvidosCount = 0;
        let apoioCount = 0;
        let socorroCount = 0;
        let vitimasCount = 0;
        let sinistroAgentesCount = 0;
        let sinistroVtrsCount = 0;
        let sinistroPhotos = [];

        // --- HELPERS ---
        function getEl(id) { return document.getElementById(id); }
        function getVal(id) { const el = getEl(id); return el ? el.value : ''; }
        function setVal(id, val) { const el = getEl(id); if (el) el.value = val; }

        // --- INITIALIZATION ---
        function init() {
            try {
                renderSelects();
                renderHistory();
                updateAgentNameDisplay();
                updateStorageUsage();
                renderResponsavelOptions();
                loadDraft();
                switchTab(activeTab);

                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                } else {
                    console.warn('Lucide not loaded yet, will retry in 500ms');
                    setTimeout(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 500);
                }

                // Add auto-save listeners
                const inputs = [
                    'simples-codigo', 'simples-custom-codigo', 'simples-local', 'simples-custom-local',
                    'especial-tipo', 'especial-descricao', 'especial-local',
                    'sinistro-data', 'sinistro-hora', 'sinistro-numero', 'sinistro-origem',
                    'sinistro-endereco', 'sinistro-caracteristica',
                    'sinistro-resumo', 'sinistro-supervisao', 'sinistro-responsavel-select', 'sinistro-responsavel-custom',
                    'sinistro-matricula', 'sinistro-data-final'
                ];
                inputs.forEach(id => {
                    const el = getEl(id);
                    if (el) el.addEventListener('input', saveDraft);
                });

                const especialTipo = getEl('especial-tipo');
                if (especialTipo) {
                    especialTipo.addEventListener('change', toggleEspecialFields);
                }
                toggleEspecialFields();

            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        function saveDraft() {
            let draft;
            try {
                draft = {
                    simplesCodigo: getVal('simples-codigo'),
                    simplesCustomCodigo: getVal('simples-custom-codigo'),
                    simplesLocal: getVal('simples-local'),
                    simplesCustomLocal: getVal('simples-custom-local'),
                    simplesHoraInicial: getVal('simples-hora-inicial'),
                    simplesHoraFinal: getVal('simples-hora-final'),
                    especialTipo: getVal('especial-tipo'),
                    especialDescricao: getVal('especial-descricao'),
                    especialLocal: getVal('especial-local'),
                    sinistro: {
                        data: getVal('sinistro-data'),
                        hora: getVal('sinistro-hora'),
                        numero: getVal('sinistro-numero'),
                        origem: getVal('sinistro-origem'),
                        endereco: getVal('sinistro-endereco'),
                        caracteristica: getVal('sinistro-caracteristica'),
                        resumo: getVal('sinistro-resumo'),
                        supervisao: getVal('sinistro-supervisao'),
                        responsavelSelect: getVal('sinistro-responsavel-select'),
                        responsavelCustom: getVal('sinistro-responsavel-custom'),
                        matricula: getVal('sinistro-matricula'),
                        dataFinal: getVal('sinistro-data-final'),
                        agentes: (getEl('sinistro-agentes-container')?.children ? Array.from(getEl('sinistro-agentes-container').children) : []).map(div => {
                            const id = div.id.split('-').pop();
                            const selectVal = getVal(`sinistro-agente-select-${id}`);
                            const customVal = getVal(`sinistro-agente-custom-${id}`);
                            return selectVal === 'Outros' ? customVal : selectVal;
                        }).filter(v => v),
                        vtrs: (getEl('sinistro-vtrs-container')?.children ? Array.from(getEl('sinistro-vtrs-container').children) : []).map(div => {
                            const id = div.id.split('-').pop();
                            const selectVal = getVal(`sinistro-vtr-select-${id}`);
                            const customVal = getVal(`sinistro-vtr-custom-${id}`);
                            return selectVal === 'Outros' ? customVal : selectVal;
                        }).filter(v => v),
                        photos: sinistroPhotos,
                        envolvidos: (getEl('envolvidos-container')?.children ? Array.from(getEl('envolvidos-container').children) : []).map(div => {
                            const id = div.id.split('-')[1];
                            return {
                                tipo: getVal(`envolvido-tipo-${id}`),
                                custom: getVal(`envolvido-custom-${id}`),
                                placa: getVal(`envolvido-placa-${id}`),
                                cnh: getVal(`envolvido-cnh-${id}`)
                            };
                        }),
                        apoio: (getEl('apoio-container')?.children ? Array.from(getEl('apoio-container').children) : []).map(div => {
                            const id = div.id.split('-')[1];
                            return {
                                tipo: getVal(`apoio-tipo-${id}`),
                                prefixo: getVal(`apoio-prefixo-${id}`),
                                responsavel: getVal(`apoio-responsavel-${id}`)
                            };
                        }),
                        socorro: (getEl('socorro-container')?.children ? Array.from(getEl('socorro-container').children) : []).map(div => {
                            const id = div.id.split('-')[1];
                            return {
                                tipo: getVal(`socorro-tipo-${id}`),
                                prefixo: getVal(`socorro-prefixo-${id}`),
                                responsavel: getVal(`socorro-responsavel-${id}`)
                            };
                        }),
                        vitimas: (getEl('vitimas-container')?.children ? Array.from(getEl('vitimas-container').children) : []).map(div => {
                            const id = div.id.split('-')[1];
                            return {
                                nome: getVal(`vitima-nome-${id}`),
                                sexo: getVal(`vitima-sexo-${id}`),
                                estado: getVal(`vitima-estado-${id}`),
                                descricao: getVal(`vitima-descricao-${id}`)
                            };
                        })
                    },
                    activeTab: activeTab,
                    editingId: editingId
                };
                localStorage.setItem('traffic_form_draft', JSON.stringify(draft));
                localStorage.setItem('traffic_simples_list_draft', JSON.stringify(simplesList));
                localStorage.setItem('traffic_active_tab', activeTab);
                if (editingId) localStorage.setItem('traffic_editing_id', editingId);
                else localStorage.removeItem('traffic_editing_id');
                updateStorageUsage();
            } catch (e) {
                console.warn('Draft save failed (likely storage limit):', e);
                if (e.name === 'QuotaExceededError' || e.message.includes('quota')) {
                    showToast('Memória cheia! Remova fotos ou limpe o histórico.', 'error');
                }
                if (draft) {
                    draft.sinistro.photos = [];
                    try {
                        localStorage.setItem('traffic_form_draft', JSON.stringify(draft));
                    } catch (e2) {
                        console.error('Even draft without photos failed:', e2);
                    }
                }
            }
        }

        function updateStorageUsage() {
            let total = 0;
            for (let x in localStorage) {
                if (localStorage.hasOwnProperty(x)) {
                    total += (localStorage[x].length * 2);
                }
            }
            const mb = (total / (1024 * 1024)).toFixed(2);
            const usageEl = getEl('storage-usage');
            if (usageEl) {
                usageEl.textContent = `${mb}MB / 5MB`;
                const percent = Math.min(100, (total / (5 * 1024 * 1024)) * 100);
                usageEl.style.color = percent > 80 ? '#ef4444' : (percent > 50 ? '#f59e0b' : '#6366f1');
            }
        }

        function loadDraft() {
            try {
                const draft = JSON.parse(localStorage.getItem('traffic_form_draft') || '{}');
                
                if (draft.simplesCodigo) {
                    setVal('simples-codigo', draft.simplesCodigo);
                    toggleCustomCodigo();
                }
                if (draft.simplesCustomCodigo) setVal('simples-custom-codigo', draft.simplesCustomCodigo);
                
                if (draft.simplesLocal) {
                    setVal('simples-local', draft.simplesLocal);
                    toggleCustomLocal();
                }
                if (draft.simplesCustomLocal) setVal('simples-custom-local', draft.simplesCustomLocal);
                if (draft.simplesHoraInicial) setVal('simples-hora-inicial', draft.simplesHoraInicial);
                if (draft.simplesHoraFinal) setVal('simples-hora-final', draft.simplesHoraFinal);
                
                if (draft.especialTipo) {
                    setVal('especial-tipo', draft.especialTipo);
                    toggleEspecialFields();
                }
                if (draft.especialDescricao) setVal('especial-descricao', draft.especialDescricao);
                if (draft.especialLocal) setVal('especial-local', draft.especialLocal);
                
                if (draft.sinistro) {
                    setVal('sinistro-data', draft.sinistro.data || '');
                    setVal('sinistro-hora', draft.sinistro.hora || '');
                    setVal('sinistro-numero', draft.sinistro.numero || '');
                    setVal('sinistro-origem', draft.sinistro.origem || '');
                    setVal('sinistro-endereco', draft.sinistro.endereco || '');
                    setVal('sinistro-caracteristica', draft.sinistro.caracteristica || '');
                    setVal('sinistro-resumo', draft.sinistro.resumo || '');
                    setVal('sinistro-supervisao', draft.sinistro.supervisao || '');
                    
                    if (draft.sinistro.responsavelSelect !== undefined) {
                        setVal('sinistro-responsavel-select', draft.sinistro.responsavelSelect || '');
                        setVal('sinistro-responsavel-custom', draft.sinistro.responsavelCustom || '');
                        toggleSinistroResponsavelCustom();
                    } else if (draft.sinistro.responsavel) {
                        const resp = draft.sinistro.responsavel;
                        if (DET_CODES.some(c => `DET ${c}` === resp)) {
                            setVal('sinistro-responsavel-select', resp);
                        } else {
                            setVal('sinistro-responsavel-select', 'Outros');
                            setVal('sinistro-responsavel-custom', resp);
                            const custom = getEl('sinistro-responsavel-custom');
                            if (custom) custom.classList.remove('hidden');
                        }
                    }
                    
                    setVal('sinistro-matricula', draft.sinistro.matricula || '');
                    setVal('sinistro-data-final', draft.sinistro.dataFinal || '');

                    if (Array.isArray(draft.sinistro.agentes)) {
                        const container = getEl('sinistro-agentes-container');
                        if (container) {
                            container.innerHTML = '';
                            draft.sinistro.agentes.forEach(it => addAgenteSinistro(it));
                        }
                    }
                    if (Array.isArray(draft.sinistro.vtrs)) {
                        const container = getEl('sinistro-vtrs-container');
                        if (container) {
                            container.innerHTML = '';
                            draft.sinistro.vtrs.forEach(it => addVtrSinistro(it));
                        }
                    }
                    if (Array.isArray(draft.sinistro.photos)) {
                        sinistroPhotos = draft.sinistro.photos;
                        renderPhotos();
                    }

                    if (Array.isArray(draft.sinistro.envolvidos)) {
                        const container = getEl('envolvidos-container');
                        if (container) {
                            container.innerHTML = '';
                            draft.sinistro.envolvidos.forEach(it => addEnvolvido(it));
                        }
                    }
                    if (Array.isArray(draft.sinistro.apoio)) {
                        const container = getEl('apoio-container');
                        if (container) {
                            container.innerHTML = '';
                            draft.sinistro.apoio.forEach(it => addApoio(it));
                        }
                    }
                    if (Array.isArray(draft.sinistro.socorro)) {
                        const container = getEl('socorro-container');
                        if (container) {
                            container.innerHTML = '';
                            draft.sinistro.socorro.forEach(it => addSocorro(it));
                        }
                    }
                    if (Array.isArray(draft.sinistro.vitimas)) {
                        const container = getEl('vitimas-container');
                        if (container) {
                            container.innerHTML = '';
                            draft.sinistro.vitimas.forEach(it => addVitima(it));
                        }
                    }
                    toggleVitimaFields();
                }

                renderSimplesList();

                if (editingId) {
                    const indicatorSimples = getEl('edit-indicator-simples');
                    const indicatorEspecial = getEl('edit-indicator-especial');
                    if (activeTab === 'simples' && indicatorSimples) indicatorSimples.classList.remove('hidden');
                    else if (indicatorEspecial) indicatorEspecial.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error loading draft:', error);
            }
        }

        function updateAgentNameDisplay() {
            const display = getEl('agent-name-display');
            if (display) display.textContent = agentName;
            setVal('agent-name-input', agentName);
            updateTodayCounter();
        }

        function updateTodayCounter() {
            const today = new Date().toLocaleDateString('pt-BR');
            const count = reports.filter(r => new Date(r.timestamp).toLocaleDateString('pt-BR') === today).length;
            const counterEl = getEl('today-counter');
            if (counterEl) {
                counterEl.textContent = `${count} HOJE`;
            }
        }

        function renderSelects() {
            const selects = [
                { id: 'simples-codigo', data: availableCodigos, prefix: '' },
                { id: 'simples-local', data: availableLocais, prefix: '' }
            ];

            selects.forEach(s => {
                const el = getEl(s.id);
                if (!el) return;
                const current = el.value;
                el.innerHTML = `<option value="">Selecionar ${s.id.includes('codigo') ? 'Código' : s.id.includes('local') ? 'Local' : s.id.includes('vtr') ? 'VTR' : 'Agente'}...</option>`;
                s.data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = s.prefix + item;
                    opt.textContent = s.prefix + item;
                    el.appendChild(opt);
                });
                if (s.id === 'simples-codigo' || s.id === 'simples-local') {
                    el.innerHTML += '<option value="Outros">Outros (Escrever manualmente)</option>';
                }
                el.value = current;
            });
        }

        function switchTab(tab) {
            activeTab = tab;
            localStorage.setItem('traffic_active_tab', tab);
            
            const contentSimples = getEl('content-simples');
            const contentEspecial = getEl('content-especial');
            const contentHistorico = getEl('content-historico');
            
            if (contentSimples) contentSimples.classList.toggle('hidden', tab !== 'simples');
            if (contentEspecial) contentEspecial.classList.toggle('hidden', tab !== 'especial');
            if (contentHistorico) contentHistorico.classList.toggle('hidden', tab !== 'historico');

            const tabSimples = getEl('tab-simples');
            const tabEspecial = getEl('tab-especial');
            const tabHistorico = getEl('tab-historico');

        function handlePhotoUpload(event) {
            const files = event.target.files;
            if (!files) return;
            
            const remainingSlots = 10 - sinistroPhotos.length;
            if (remainingSlots <= 0) {
                showToast('Limite de 10 fotos atingido.', 'error');
                event.target.value = '';
                return;
            }

            const filesToProcess = Array.from(files).slice(0, remainingSlots);
            if (files.length > remainingSlots) {
                showToast(`Apenas as primeiras ${remainingSlots} fotos serão processadas.`, 'warning');
            }

            filesToProcess.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        const MAX_WIDTH = 1280;
                        const MAX_HEIGHT = 1280;
                        
                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        sinistroPhotos.push(compressedBase64);
                        renderPhotos();
                        saveDraft();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            event.target.value = '';
        }

            const modal = getEl('manage-options-modal');
            if (modal) modal.classList.replace('flex', 'hidden');

        function renderOptionsList() {
            const list = getEl('options-list');
            if (!list) return;
            const options = manageType === 'codigo' ? availableCodigos : availableLocais;
            list.innerHTML = '';
            
            options.forEach((opt, idx) => {

                div.className = 'flex items-center justify-between bg-slate-800 p-3 rounded-xl border border-slate-700 group';

                        <button onclick="deleteOption(${idx})" class="p-2 text-slate-500 hover:text-red-400 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });

        function addNewOption() {
            const val = getVal('new-option-input').trim();
            if (!val) return showToast('Digite um valor.', 'error');
            
            const list = manageType === 'codigo' ? availableCodigos : availableLocais;
            if (list.includes(val)) return showToast('Já existe.', 'error');
            
            list.push(val);
            saveOptions();
            setVal('new-option-input', '');
            renderOptionsList();
            renderSelects();
            showToast('Adicionado!');
        }

        function deleteOption(idx) {
            const list = manageType === 'codigo' ? availableCodigos : availableLocais;
            list.splice(idx, 1);
            saveOptions();
            renderOptionsList();
            renderSelects();
            showToast('Excluído.');
        }

        function editOption(idx) {
            const list = manageType === 'codigo' ? availableCodigos : availableLocais;
            const newVal = prompt('Editar opção:', list[idx]);
            if (newVal === null) return;
            const trimmed = newVal.trim();
            if (!trimmed) return showToast('Valor inválido.', 'error');
            
            list[idx] = trimmed;
            saveOptions();
            renderOptionsList();
            renderSelects();
            showToast('Atualizado!');
        }

        function saveOptions() {
            if (manageType === 'codigo') {
                localStorage.setItem('traffic_available_codigos', JSON.stringify(availableCodigos));
            } else {
                localStorage.setItem('traffic_available_locais', JSON.stringify(availableLocais));
            }
            updateStorageUsage();
        }

        let deleteTargetId = null;
        function openConfirm(id) {
            deleteTargetId = id;
            const modal = getEl('confirm-modal');
            if (modal) modal.classList.replace('hidden', 'flex');
            const btn = getEl('confirm-delete-btn');
            if (btn) {
                btn.onclick = () => {
                    const ids = deleteTargetId.split(',');
                    reports = reports.filter(r => !ids.includes(r.id));
                    localStorage.setItem('traffic_reports', JSON.stringify(reports));
                    closeConfirm();
                    renderHistory();
                    updateTodayCounter();
                    updateStorageUsage();
                    showToast('Excluído com sucesso.');
                };
            }
        }
        function clearAllPhotos() {
            if (!confirm('Deseja remover TODAS as fotos de todos os registros para liberar espaço? Os textos serão mantidos.')) return;
            
            reports = reports.map(r => {
                if (r.data && r.data.photos) {
                    return { ...r, data: { ...r.data, photos: [] } };
                }
                return r;
            });
            
            localStorage.setItem('traffic_reports', JSON.stringify(reports));
            renderHistory();
            updateStorageUsage();
            showToast('Fotos removidas com sucesso!');
        }

            const modal = getEl('confirm-modal');
            if (modal) modal.classList.replace('hidden', 'flex');
            const btn = getEl('confirm-delete-btn');
            if (btn) {
                btn.onclick = () => {
                    reports = [];

                    closeConfirm();
                    renderHistory();
                    updateTodayCounter();
                    updateStorageUsage();
                    showToast('Histórico limpo com sucesso.');
                };

            if (modal) modal.classList.replace('flex', 'hidden');

            if (simplesList.length === 0) {

        // --- HISTORY ---
        function renderHistory() {
            const list = getEl('history-list');
            const count = getEl('history-count');
            if (!list || !count) return;
            count.textContent = reports.length;

            if (reports.length === 0) {
                list.innerHTML = `
                    <div class="bg-slate-900 rounded-2xl p-10 text-center border-2 border-dashed border-slate-800">
                        <i data-lucide="history" class="w-12 h-12 text-slate-700 mx-auto mb-4"></i>
                        <p class="text-slate-500 font-medium">Nenhum registro encontrado.</p>
                    </div>
                `;
                if (typeof lucide !== 'undefined') lucide.createIcons();
                return;
            }

            const groups = {};
            reports.forEach(r => {
                const date = new Date(r.timestamp).toLocaleDateString('pt-BR');
                if (!groups[date]) groups[date] = { simples: [], especial: [] };
                if (r.type === 'simples') groups[date].simples.push(r);
                else if (r.type === 'especial') groups[date].especial.push(r);
            });

            list.innerHTML = '';
            Object.entries(groups).sort((a,b) => {
                const [da, ma, ya] = a[0].split('/');
                const [db, mb, yb] = b[0].split('/');
                const dateA = new Date(`${ya}-${ma}-${da}`);
                const dateB = new Date(`${yb}-${mb}-${db}`);
                return dateB - dateA;
            }).forEach(([date, grp]) => {
                const dateDiv = document.createElement('div');
                dateDiv.className = 'space-y-3';
                dateDiv.innerHTML = `
                    <div class="flex items-center gap-3 px-2">
                        <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>
                        <span class="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">${date}</span>
                        <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>
                    </div>
                `;


                if (grp.simples.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-3xl p-5 shadow-sm space-y-4 border border-slate-200 border-l-4 border-l-indigo-500';
                    const allItems = grp.simples.flatMap(r => r.data.items || []);
                    const ids = grp.simples.map(r => r.id).join(',');
                    
                    let itemsHtml = '';
                    grp.simples.sort((a,b) => b.timestamp - a.timestamp).forEach(r => {
                        itemsHtml += `
                            <div class="space-y-2">
                                <div class="flex justify-end items-center">
                                    <div class="flex gap-2">
                                        <button onclick="editReport('${r.id}')" class="text-[9px] text-indigo-400 font-bold uppercase">Editar</button>
                                        <button onclick="openConfirm('${r.id}')" class="text-[9px] text-red-400 font-bold uppercase">Remover</button>
                                    </div>
                                </div>
                                <div class="text-[10px] text-slate-600 p-3 rounded-xl border border-slate-100 space-y-1">
                                    ${r.data.horaInicial || r.data.horaFinal ? `
                                        <div class="flex gap-2 mb-2 pb-2 border-b border-slate-50 text-indigo-500 font-bold">
                                            ${r.data.horaInicial ? `<span>Início: ${r.data.horaInicial}</span>` : ''}
                                            ${r.data.horaFinal ? `<span>Fim: ${r.data.horaFinal}</span>` : ''}
                                        </div>
                                    ` : ''}
                                    ${r.data.items.map(it => `<div class="flex justify-between"><span class="font-bold text-slate-700">${it.codigo}</span><span class="truncate ml-2 text-slate-500">${it.local}</span></div>`).join('')}
                                </div>
                            </div>

        function formatDateBR(dateStr) {
            if (!dateStr) return '---';
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        async function sendWhatsAppSingle(id) {
            const r = reports.find(x => x.id === id);
            if (!r) return;
            let message = '';
            const reportAgent = r.agent || agentName;
            const reportDate = new Date(r.timestamp).toLocaleDateString('pt-BR');
            if (r.type === 'simples') {
                message = formatSimplesMessage(r.data.items, reportAgent, reportDate);
            } else {
                if (r.data.tipo === 'Sinistro de trânsito') {
                    message = formatSinistroMessage(r.data);
                } else {
                    message = `*REGISTRO DE OCORRÊNCIAS*\n*AGENTE:* ${reportAgent}\n*DATA:* ${reportDate}\n\n*OCORRÊNCIA ESPECIAL*\n\n*TIPO:* ${r.data.tipo.toUpperCase()}\n*DESCRIÇÃO:* ${r.data.descricao}\n*LOCAL:* ${r.data.local}`;
                }
            }

            // Try to use Web Share API if it's a Sinistro with photos
            if (r.data.tipo === 'Sinistro de trânsito' && r.data.photos && r.data.photos.length > 0 && navigator.share) {
                try {
                    const files = [];
                    for (let i = 0; i < r.data.photos.length; i++) {
                        const base64 = r.data.photos[i];
                        const res = await fetch(base64);
                        const blob = await res.blob();
                        const file = new File([blob], `foto-${i + 1}.jpg`, { type: 'image/jpeg' });
                        files.push(file);
                    }

                    if (navigator.canShare && navigator.canShare({ files })) {
                        await navigator.share({
                            files: files,
                            title: 'Relatório de Sinistro',
                            text: message
                        });
                        return;
                    }
                } catch (err) {
                    console.error('Share failed:', err);
                }
            }

            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }


        function formatSinistroMessage(d) {
            let message = `*RELATÓRIO DE SINISTRO DE TRÂNSITO*\n\n`;
            message += `*DATA:* ${formatDateBR(d.data)}\n*HORA:* ${d.hora}\n*N° OCORRÊNCIA:* ${d.numero}\n*ORIGEM:* ${d.origem}\n*ENDEREÇO:* ${d.endereco}\n`;
            message += `*CARACTERÍSTICA:* ${d.caracteristica}\n\n`;
            
            if (Array.isArray(d.vitimas) && d.vitimas.length > 0 && d.caracteristica === 'Com vítima') {
                message += `*VÍTIMAS:*\n`;
                d.vitimas.forEach((v, i) => {
                    message += `Vítima ${i + 1}:\n`;
                    message += `- NOME: ${v.nome || '---'}\n`;
                    message += `- SEXO: ${v.sexo || '---'}\n`;
                    message += `- ESTADO: ${v.estado || '---'}\n`;
                    message += `- DESCRIÇÃO: ${v.descricao || '---'}\n`;
                });
                message += `\n`;
            }

            if (Array.isArray(d.envolvidos) && d.envolvidos.length > 0) {
                message += `*ENVOLVIDOS:*\n`;
                d.envolvidos.forEach((env, i) => {
                    const tipoFinal = env.tipo === 'Outros' ? env.custom : env.tipo;
                    message += `Condutor ${i + 1}: ${tipoFinal}`;
                    if (env.placa) message += ` | PLACA: ${env.placa}`;
                    if (env.cnh) message += ` | CNH: ${env.cnh}`;
                    message += `\n`;
                });
                message += `\n`;
            }

            if (Array.isArray(d.socorro) && d.socorro.length > 0) {
                message += `*SOCORRO MÉDICO:*\n`;
                d.socorro.forEach(s => {
                    message += `- ${s.tipo}\n`;
                    if (s.prefixo) message += `  VTR: ${s.prefixo}\n`;
                    if (s.responsavel) message += `  RESP: ${s.responsavel}\n`;
                });
                message += `\n`;
            }

            if (Array.isArray(d.apoio) && d.apoio.length > 0) {
                message += `*APOIO POLICIAL:*\n`;
                d.apoio.forEach((ap, i) => {
                    message += `${i+1}. ${ap.tipo} | VTR: ${ap.prefixo} | RESP: ${ap.responsavel}\n`;
                });
                message += `\n`;
            }

            message += `*RESUMO DOS FATOS:* ${d.resumo}\n\n`;
            
            if (Array.isArray(d.agentes) && d.agentes.length > 0) {
                message += `*AGENTES ENVOLVIDOS:* ${d.agentes.join(', ')}\n`;
            }
            if (Array.isArray(d.vtrs) && d.vtrs.length > 0) {
                message += `*VTR:* ${d.vtrs.join(', ')}\n`;
            }
            
            message += `*SUPERVISÃO:* ${d.supervisao}\n`;
            message += `*RESPONSÁVEL PELO RELATÓRIO:* ${d.responsavel}\n*MATRÍCULA:* ${d.matricula}\n*DATA DO RELATÓRIO:* ${formatDateBR(d.dataFinal)}\n\n`;
            
            if (d.photos && d.photos.length > 0) {
                message += `*FOTOS:* ${d.photos.length} foto(s) anexada(s).`;
            }

            return message;
        }

        function sendWhatsAppBulk(date) {
            const dayReports = reports.filter(r => new Date(r.timestamp).toLocaleDateString('pt-BR') === date && r.type === 'simples');
            const allItems = dayReports.flatMap(r => r.data.items);
            const message = formatSimplesMessage(allItems, agentName, date);
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function formatSimplesMessage(items, name, date = null) {
            const currentAgent = name || agentName;
            const grouped = {};
            items.forEach(it => {
                if (!grouped[it.codigo]) grouped[it.codigo] = [];
                grouped[it.codigo].push(it.local);
            });
            let msg = `*REGISTRO DE OCORRÊNCIAS*\n*AGENTE:* ${currentAgent}\n`;
            if (date) msg += `*DATA:* ${date}\n`;
            msg += `\n*OCORRÊNCIAS SIMPLES*\n`;
            Object.keys(grouped).forEach(cod => {
                msg += `\n*CÓDIGO:* ${cod}\n*LOCAIS:*`;
                grouped[cod].forEach(loc => msg += `\n- ${loc}`);
                msg += `\n`;
            });
            return msg;
        }

                        <div><strong>VTR:</strong> ${data.vtrs.join(', ') || '---'}</div>
                    </div>

                    <div style="margin-bottom: 40px; font-size: 13px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div><strong>SUPERVISÃO:</strong> ${data.supervisao || '---'}</div>
                        <div><strong>RESPONSÁVEL PELO RELATÓRIO:</strong> ${data.responsavel || '---'}</div>
                        <div><strong>DATA DO RELATÓRIO:</strong> ${data.dataRelatorio}</div>
                    </div>

                    <!-- Signature Area -->
                    <div style="margin-top: 50px; display: flex; flex-direction: column; align-items: center; page-break-inside: avoid;">
                        <div style="width: 300px; border-top: 2px solid #000; margin-bottom: 8px;"></div>
                        <div style="font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Assinatura do Agente</div>
                        <div style="font-size: 11px; color: #666; margin-top: 4px;">${data.responsavel || '---'}</div>
                    </div>

                    <!-- Footer Info -->
                    <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; font-size: 10px; color: #999; text-align: center;">
                        Relatório gerado via Sistema de Registro Operacional - Jacareí
                    </div>
                </div>
            `;

            container.innerHTML = html;
            container.classList.remove('hidden');

            // Wait for fonts/images to load if any
            await new Promise(resolve => setTimeout(resolve, 500));

            try {
                const canvas = await html2canvas(container, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                const imgProps = doc.getImageProperties(imgData);
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                const pageHeight = doc.internal.pageSize.getHeight();
                
                let heightLeft = pdfHeight;
                let position = 0;

                doc.addImage(imgData, 'JPEG', 0, position, pdfWidth, pdfHeight);
                heightLeft -= pageHeight;

                while (heightLeft >= 0) {
                    position = heightLeft - pdfHeight;
                    doc.addPage();
                    doc.addImage(imgData, 'JPEG', 0, position, pdfWidth, pdfHeight);
                    heightLeft -= pageHeight;
                }

                doc.save(`Sinistro_${data.numero.replace(/\//g, '-') || Date.now()}.pdf`);
                showToast('PDF gerado com sucesso!', 'success');
            } catch (error) {
                console.error('PDF generation error:', error);
                showToast('Erro ao gerar PDF.', 'error');
            } finally {
                container.classList.add('hidden');
                container.innerHTML = '';
            }
        }

        init();
    </script>
</body>
</html>
